---
# 9.6: Map throw-if-error propagates an item failure to the execution
description: Map where the handler asks the batch result to rethrow, propagating an item failure so
  the execution fails
handler: |
  Handler invokes the map operation over two items with a fail-fast completion config
  (tolerated-failure-count=0). Max-concurrency is 1: item 0 raises an error and fails, so fail-fast
  stops the operation and item 1 is never started. The map operation returns a batch result; the
  handler then asks the batch result to rethrow, which rethrows the first item failure. The error
  is not caught, so the execution fails.
invocations: |
  - Handler invokes map(name="throwing", items=[i0, i1], mapFunc, max-concurrency=1, completion
    config tolerated-failure-count=0). The SDK checkpoints ContextStarted (SubType Map). Item 0
    runs and fails (ContextStarted / ContextFailed, SubType MapIteration). Fail-fast stops the
    operation without starting item 1. The SDK checkpoints ContextSucceeded (SubType Map). The
    handler asks the batch result to rethrow, the error propagates uncaught, and the execution
    fails.
Input: null
ExpectedResult:
  ExecutionStatus: FAILED
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Map
    EventId: 2
    Id: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: MapIteration
    EventId: 3
    Id: ${ITER0}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: MapIteration
    EventId: 4
    Id: ${ITER0}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextSucceeded
    SubType: Map
    EventId: 5
    Id: ${CTX_M}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionFailed
    EventId: 7
    EventTimestamp: '*'
    ExecutionFailedDetails:
      Error:
        Payload:
          ErrorType: '*'
