---
# 9.8: Map tolerated-failure-count within tolerance (all items complete)
description: Map with a tolerated-failure-count tolerating one failure completes every item
handler: |
  Handler invokes the map operation over three items with a completion config of
  tolerated-failure-count=1. Max-concurrency is 1 so items run sequentially: item 0 succeeds, item
  1 raises an error and fails, item 2 succeeds. Because the failure count (1) does not exceed the
  tolerated failure count (1), the operation does not stop early and all items complete. The
  handler returns a projection {completionReason, status, successCount, failureCount, totalCount}.
  Completion reason is ALL_COMPLETED, but status is FAILED because at least one item failed.
invocations: |
  - Handler invokes map(name="tolerated", items=[i0, i1, i2], mapFunc, max-concurrency=1, completion
    config tolerated-failure-count=1). The SDK checkpoints ContextStarted (SubType Map), then item
    0 succeeds (ContextStarted / ContextSucceeded), item 1 fails (ContextStarted / ContextFailed),
    and item 2 succeeds (ContextStarted / ContextSucceeded), all SubType MapIteration. The SDK
    checkpoints ContextSucceeded (SubType Map) and the invocation completes returning the
    projection object.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result:
    completionReason: ALL_COMPLETED
    status: FAILED
    successCount: 2
    failureCount: 1
    totalCount: 3
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Map
    EventId: 2
    Id: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: MapIteration
    EventId: 3
    Id: ${ITER0}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextSucceeded
    SubType: MapIteration
    EventId: 4
    Id: ${ITER0}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: ContextStarted
    SubType: MapIteration
    EventId: 5
    Id: ${ITER1}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: MapIteration
    EventId: 6
    Id: ${ITER1}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextStarted
    SubType: MapIteration
    EventId: 7
    Id: ${ITER2}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextSucceeded
    SubType: MapIteration
    EventId: 8
    Id: ${ITER2}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: ContextSucceeded
    SubType: Map
    EventId: 9
    Id: ${CTX_M}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 10
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
