---
# 3.7: Child context with step retry (fails then succeeds)
description: Child context with step retry (fails then succeeds)
handler: |
  A child context containing a step that fails on the first attempt and succeeds on the second,
  with a retry strategy configured on the step.
  The step returns the input string on the successful attempt.
  The child context returns the step result.
invocations: |
  - Handler invokes a child context with a step that has a retry strategy configured. ContextStarted, StepStarted, step fails, StepFailed with RetryDetails, invocation completes, execution suspends.
  - Replay 1: Re-invoked because retry delay elapsed. StepStarted, step succeeds, StepSucceeded with RetryDetails, ContextSucceeded, execution succeeds.
Variables:
  INPUT_1: ${GEN_STR:8}
Input: ${INPUT_1}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result: ${INPUT_1}
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: RunInChildContext
    EventId: 2
    Id: ${CTX1}
    Name: ${NAME1}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 3
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepFailed
    SubType: Step
    EventId: 4
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepFailedDetails:
      Error: {}
      RetryDetails:
        CurrentAttempt: 1
        NextAttemptDelaySeconds: '*'
  - EventType: InvocationCompleted
    EventId: 5
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 6
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 7
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '"${INPUT_1}"'
      RetryDetails:
        CurrentAttempt: 2
  - EventType: ContextSucceeded
    SubType: RunInChildContext
    EventId: 8
    Id: ${CTX1}
    Name: ${NAME1}
    EventTimestamp: '*'
    ContextSucceededDetails:
      Result:
        Payload: '"${INPUT_1}"'
  - EventType: InvocationCompleted
    EventId: 9
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
