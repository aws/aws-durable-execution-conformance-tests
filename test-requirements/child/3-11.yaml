---
# 3.11: Child context large payload (ReplayChildren mode)
description: Child context large payload (ReplayChildren mode)
handler: |
  A child context where the step returns a small value, but the child context function
  builds a large result (>256KB) from it. The child context return value exceeds the
  checkpoint size limit, triggering ReplayChildren mode.
  The child context body prints the input string to raw stdout outside of the step.
invocations: |
  - Handler invokes a child context with a step that returns a small value, but the child context body builds a large result exceeding the checkpoint size limit. ContextStarted, StepStarted, StepSucceeded (small result), ContextSucceeded (ReplayChildren=true, empty payload), WaitStarted, invocation completes, execution suspends.
  - Replay 1: Re-invoked because wait completed. SDK re-executes the child context in ReplaySucceededContext mode to reconstruct the large result. WaitSucceeded, execution succeeds.
Variables:
  INPUT_1: ${GEN_STR:8}
Input: ${INPUT_1}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: RunInChildContext
    EventId: 2
    Id: ${CTX1}
    Name: ${NAME1}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 3
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 4
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepSucceededDetails: {}
  - EventType: ContextSucceeded
    SubType: RunInChildContext
    EventId: 5
    Id: ${CTX1}
    Name: ${NAME1}
    EventTimestamp: '*'
    ContextSucceededDetails: {}
  - EventType: WaitStarted
    SubType: Wait
    EventId: 6
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: '*'
  - EventType: InvocationCompleted
    EventId: 7
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 8
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: '*'
  - EventType: InvocationCompleted
    EventId: 9
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
ExpectedLogs:
  # Child context body executes twice: once on first invocation, once on replay
  - pattern: ${INPUT_1}
    count: 2
