---
# 4.9: Callback + Wait + Wait for callback result (success)
description: createCallback then a duration wait, then wait for callback result —
  wait suspends invocation while callback resolves
async: true
handler: |
  Handler creates a callback using the input as the callback name, then waits for 5 seconds, then blocks on the callback result.
  The callback resolves during the wait period.
invocations: |
  - Handler creates a callback, then starts a 5-second wait, then blocks on the callback result. The SDK checkpoints CallbackStarted and WaitStarted (5s). The invocation completes and execution suspends.
  - Replay 1: Received callback success. The SDK replays state, sees the wait still pending, and the invocation completes.
  - Replay 2: Wait completed. The SDK replays both operations as completed, returns the callback result, and execution succeeds.
AsyncInvoke: true
Variables:
  CB_NAME: ${GEN_STR:10}
  CB_PAYLOAD: ${GEN_STR:12}
Input: ${CB_NAME}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
CallbackActions:
  - CallbackName: ${CB_NAME}
    Operation: success
    Payload: ${CB_PAYLOAD}
    Delay: 1
ExpectedExecutionHistory:
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 2
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
  - EventType: WaitStarted
    SubType: Wait
    EventId: 3
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: 5
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackSucceeded
    SubType: Callback
    EventId: 5
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackSucceededDetails:
      Result:
        Payload: '"${CB_PAYLOAD}"'
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 7
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: 5
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionSucceeded
    EventId: 9
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result: '*'
