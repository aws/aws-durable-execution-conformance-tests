---
# 4.14: Replay — Callback timeout caught → Wait → return
description: Handler catches a callback timeout and continues with a wait, verifying
  replay
async: true
handler: |
  Handler creates a callback using the input as the callback name with a 3-second timeout, blocks on the callback result with error handling, and on timeout stores an error message.
  Then starts a 2-second wait, then returns. Execution succeeds because the handler caught the timeout error.
invocations: |
  - Handler creates a callback with a 3-second timeout and blocks on the callback result with error handling. The SDK checkpoints CallbackStarted (Timeout=3). The invocation completes and execution suspends.
  - Replay 1: Callback timed out. The SDK replays CallbackTimedOut, raises the error but the handler catches it, then starts a 2-second wait. The SDK checkpoints WaitStarted. The invocation completes and execution suspends.
  - Replay 2: Wait completed. The SDK replays the callback timeout (caught) and wait as done, the handler returns, and execution succeeds.
AsyncInvoke: true
Variables:
  CB_NAME: ${GEN_STR:10}
Input: ${CB_NAME}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
# No CallbackActions — let the callback time out
ExpectedExecutionHistory:
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 2
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
      Timeout: 3
  - EventType: InvocationCompleted
    EventId: 3
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackTimedOut
    SubType: Callback
    EventId: 4
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackTimedOutDetails:
      Error:
        Payload:
          ErrorType: Callback.Timeout
  - EventType: WaitStarted
    SubType: Wait
    EventId: 5
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: 2
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 7
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: 2
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionSucceeded
    EventId: 9
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result: '*'
