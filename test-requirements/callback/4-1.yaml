---
# 4.1: Create callback basic (success via external callback)
description: Create callback basic — handler creates a callback and awaits callback
  result
async: true
handler: |
  Handler creates a callback using the input as the callback name, blocks on the callback result, and returns the deserialized result.
  The external system completes the callback with a success payload.
invocations: |
  - Handler creates a callback with the name from input. The SDK checkpoints CallbackStarted with the generated CallbackId. The invocation completes and execution suspends.
  - Replay 1: Received callback success. The SDK checkpoints CallbackSucceeded with the payload as Result, and execution succeeds.
AsyncInvoke: true
Variables:
  CB_NAME: ${GEN_STR:10}
  CB_PAYLOAD: ${GEN_STR:12}
Input: ${CB_NAME}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
CallbackActions:
  - CallbackName: ${CB_NAME}
    Operation: success
    Payload: ${CB_PAYLOAD}
    Delay: 1
ExpectedExecutionHistory:
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 2
    Id: ${ID1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
  - EventType: InvocationCompleted
    EventId: 3
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackSucceeded
    SubType: Callback
    EventId: 4
    Id: ${ID1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackSucceededDetails:
      Result:
        Payload: '"${CB_PAYLOAD}"'
  - EventType: InvocationCompleted
    EventId: 5
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionSucceeded
    EventId: 6
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result: '*'
