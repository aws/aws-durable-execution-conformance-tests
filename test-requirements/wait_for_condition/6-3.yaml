---
# 6.3: Wait-for-condition with explicit name
description: Wait-for-condition with an explicit operation name — the name is recorded
  on every poll event
handler: |
  Handler runs a single wait_for_condition operation given the explicit name "poll-status". The
  check function increments an integer state starting from 0; the wait strategy continues while the
  state is below 2 and stops once it reaches 2. Returns the final counter value (2).
invocations: |
  - Handler invokes wait_for_condition named "poll-status". SDK checkpoints StepStarted (SubType WaitForCondition, Name poll-status), runs the first check (0 -> 1), continue, StepSucceeded checkpointed with Name poll-status, invocation completes, execution suspends.
  - Replay 1: Second check (1 -> 2). State reaches the threshold, the wait strategy stops, SDK checkpoints the terminal StepSucceeded (Name poll-status), execution succeeds returning 2.
Input: 2
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result: 2
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: WaitForCondition
    EventId: 2
    Id: ${ID1}
    Name: poll-status
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: WaitForCondition
    EventId: 3
    Id: ${ID1}
    Name: poll-status
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '1'
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: StepStarted
    SubType: WaitForCondition
    EventId: 5
    Id: ${ID1}
    Name: poll-status
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: WaitForCondition
    EventId: 6
    Id: ${ID1}
    Name: poll-status
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '2'
  - EventType: ExecutionSucceeded
    EventId: 8
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result:
        Payload: '2'
