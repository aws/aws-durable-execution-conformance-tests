---
# 6.13: Multiple sequential wait_for_condition operations
description: Two sequential wait_for_condition operations in one handler — each is a
  distinct operation with its own Id, and the first result seeds the second
handler: |
  Handler runs two wait_for_condition operations back to back. The first starts from an initial
  state of 0, increments the state by 1 on each invocation, and stops once the state reaches 2,
  returning 2. That result seeds the second operation's initial state; the second increments and
  stops once the state reaches 4, returning 4. The handler returns the second operation's result.
invocations: |
  - Fresh invoke: first wait_for_condition checkpoints StepStarted (SubType WaitForCondition, Id ${ID1}), first check 0 -> 1, continue, StepSucceeded checkpointed with state 1, invocation completes, execution suspends.
  - Replay 1: first operation resumes, second check 1 -> 2, reaches threshold, terminal StepSucceeded for ${ID1} with state 2; the first operation returns 2. The handler then starts the second wait_for_condition in the same invocation: StepStarted (SubType WaitForCondition, new Id ${ID2}), first check 2 -> 3, continue, StepSucceeded checkpointed with state 3, invocation completes, execution suspends.
  - Replay 2: second operation resumes, check 3 -> 4, reaches threshold, terminal StepSucceeded for ${ID2} with state 4, execution succeeds returning 4.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result: 4
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: WaitForCondition
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: WaitForCondition
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '1'
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: StepStarted
    SubType: WaitForCondition
    EventId: 5
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: WaitForCondition
    EventId: 6
    Id: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '2'
  - EventType: StepStarted
    SubType: WaitForCondition
    EventId: 7
    Id: ${ID2}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: WaitForCondition
    EventId: 8
    Id: ${ID2}
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '3'
  - EventType: InvocationCompleted
    EventId: 9
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: StepStarted
    SubType: WaitForCondition
    EventId: 10
    Id: ${ID2}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: WaitForCondition
    EventId: 11
    Id: ${ID2}
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '4'
  - EventType: ExecutionSucceeded
    EventId: 13
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result:
        Payload: '4'
