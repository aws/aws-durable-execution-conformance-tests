---
# 1.14: Retry with custom config (fixed interval and backoff)
description: Retry with custom config (fixed interval and backoff)
handler: |
  A step that fails twice then succeeds, with a custom retry strategy: initial delay 2s, backoff rate 3x, no jitter.
  Uses DynamoDB to track attempt count across invocations.
invocations: |
  - Handler invokes `context.step(func, config={ retryStrategy: createRetryStrategy({ maxAttempts: 5, initialDelay: 2s, backoffRate: 3, jitter: NONE }) })`, step fails, SDK checkpoints StepFailed with retry delay=2s, invocation completes, execution suspends.
  - Replay 1: Re-invoked because retry delay elapsed, SDK replays, re-executes step, step fails again, SDK checkpoints StepFailed with retry delay=6s (2s * 3x backoff), invocation completes, execution suspends.
  - Replay 2: Re-invoked because retry delay elapsed, SDK replays, re-executes step, step succeeds, SDK checkpoints StepSucceeded with RetryDetails (CurrentAttempt=3), execution succeeds.
Input:
ExpectedResult:
  ExecutionStatus: SUCCEEDED
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: Step
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepFailed
    SubType: Step
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepFailedDetails:
      Error:
        Payload: {}
      RetryDetails:
        CurrentAttempt: 1
        NextAttemptDelaySeconds: 2
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 5
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepFailed
    SubType: Step
    EventId: 6
    Id: ${ID1}
    EventTimestamp: '*'
    StepFailedDetails:
      Error:
        Payload: {}
      RetryDetails:
        CurrentAttempt: 2
        NextAttemptDelaySeconds: 6
  - EventType: InvocationCompleted
    EventId: 7
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 8
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 9
    Id: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails:
      Result: {}
      RetryDetails:
        CurrentAttempt: 3
  - EventType: InvocationCompleted
    EventId: 10
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
