---
# 1.9: Replay skips succeeded step
description: Replay skips succeeded step
handler: |
  A step that succeeds, followed by a wait. On replay, the step returns its checkpointed result without re-executing.
invocations: |
  - Handler invokes `context.step(func)`, step executes, logs "step executed", succeeds, wait starts, invocation completes, execution suspends.
  - Replay 1: Re-invoked because wait completed, SDK skips the completed step (returns cached result without calling the step function), wait completes, execution succeeds.
Input:
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result: cached_value
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: Step
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails: {}
  - EventType: WaitStarted
    SubType: Wait
    EventId: 4
    Id: ${ID2}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: 1
  - EventType: InvocationCompleted
    EventId: 5
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 6
    Id: ${ID2}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: 1
  - EventType: InvocationCompleted
    EventId: 7
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
