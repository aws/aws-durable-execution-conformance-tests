---
# 1.10: Replay re-throws failed step
description: Replay re-throws failed step
handler: |
  A step that fails permanently, wrapped in try/catch, followed by a wait. On replay, the failed step re-throws the same error without re-executing.
invocations: |
  - Handler invokes `context.step(func, config=noRetry)` inside try/catch, step executes, logs "step executed", fails permanently, error is caught, wait starts, invocation completes, execution suspends.
  - Replay 1: Re-invoked because wait completed, SDK re-throws the cached error without calling the step function, error is caught again, wait completes, execution succeeds.
Input:
ExpectedResult:
  ExecutionStatus: SUCCEEDED
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: Step
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepFailed
    SubType: Step
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepFailedDetails:
      Error:
        Payload:
          ErrorMessage: '*'
          ErrorType: '*'
  - EventType: WaitStarted
    SubType: Wait
    EventId: 4
    Id: ${ID2}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: 1
  - EventType: InvocationCompleted
    EventId: 5
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 6
    Id: ${ID2}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: 1
  - EventType: InvocationCompleted
    EventId: 7
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
