---
# 8.10: Parallel tolerated-failure-count exceeded (stops early)
description: Parallel stops early once the failure count exceeds the tolerated-failure-count
handler: |
  Handler invokes the parallel operation with three branches and a completion config of
  tolerated-failure-count=1. Max-concurrency is 1 so branches run sequentially: branch 0 fails
  (failure count 1, not yet exceeding the tolerance), branch 1 also fails (failure count 2, now
  exceeding the tolerance of 1), so the operation stops early and branch 2 is never started. The
  handler returns a projection {completionReason, successCount, failureCount, totalCount}.
  Completion reason is FAILURE_TOLERANCE_EXCEEDED.
invocations: |
  - Handler invokes parallel(name="tolerated-exceeded", branches=[b0, b1, b2], max-concurrency=1,
    completion config tolerated-failure-count=1). The SDK checkpoints ContextStarted (SubType
    Parallel), then branch 0 fails (ContextStarted / ContextFailed) and branch 1 fails
    (ContextStarted / ContextFailed), all SubType ParallelBranch. The failure count now exceeds
    the tolerance so the operation stops without starting branch 2. The SDK checkpoints
    ContextSucceeded (SubType Parallel) and the invocation completes returning the projection.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result:
    completionReason: FAILURE_TOLERANCE_EXCEEDED
    successCount: 0
    failureCount: 2
    totalCount: 2
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Parallel
    EventId: 2
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 3
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 4
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 5
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 6
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextSucceeded
    SubType: Parallel
    EventId: 7
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
