---
# 10.2: Plugin operation lifecycle hooks
description: Plugin operation lifecycle hooks (step start and terminal end)
optional: true
handler: |
  A handler with a single step that returns a greeting string, configured with an
  instrumentation plugin. The plugin, filtering to step-type operations only, logs
  `CONFPLUGIN operation-start` from its operation-start hook and
  `CONFPLUGIN operation-end status=<status>` from its operation-end hook (status
  as the operation-status enum token, e.g. SUCCEEDED).
invocations: |
  - Handler invokes `context.step(greet(event))`, step succeeds on first attempt.
    The plugin's operation-start hook fires when the step's STARTED checkpoint is
    observed and its operation-end hook fires when the step reaches its terminal
    SUCCEEDED status. Operation hooks may be dispatched asynchronously, so their
    relative log order is not asserted — only that each fires exactly once.
Variables:
  INPUT_1: ${GEN_STR:8}
Input: ${INPUT_1}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result: Hello, ${INPUT_1}!
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: Step
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails: {}
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
ExpectedLogs:
  # Both operation hooks fire exactly once; dispatch may be async,
  # so no relative ordering is asserted
  - pattern: CONFPLUGIN operation-start
    count: 1
    unordered: true
  - pattern: CONFPLUGIN operation-end status=SUCCEEDED
    count: 1
    unordered: true
  # The step never reaches a FAILED terminal status
  - pattern: CONFPLUGIN operation-end status=FAILED
    count: 0
