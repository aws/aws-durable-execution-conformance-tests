---
# 3.12: Child context interrupted and re-executed
description: Child context interrupted and re-executed
handler: |
  A child context that is interrupted (e.g., Lambda crash via process.exit) after ContextStarted
  and StepStarted are checkpointed but before StepSucceeded. On the next invocation, the SDK
  re-executes the step and checkpoints StepSucceeded directly (without another StepStarted).
  The step returns the input string.
  The child context returns the step result.
invocations: |
  - Handler invokes a child context with a step that crashes the Lambda process after ContextStarted and StepStarted are checkpointed but before StepSucceeded. InvocationCompleted with Runtime.ExitError.
  - Replay 1: Re-invoked because Lambda crashed. SDK re-executes the step and checkpoints StepSucceeded directly (without another StepStarted). ContextSucceeded, execution succeeds.
Variables:
  INPUT_1: ${GEN_STR:8}
Input: ${INPUT_1}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result: ${INPUT_1}
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: RunInChildContext
    EventId: 2
    Id: ${CTX1}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 3
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 5
    Id: ${STEP1}
    ParentId: ${CTX1}
    EventTimestamp: '*'
    StepSucceededDetails:
      Result:
        Payload: '"${INPUT_1}"'
  - EventType: ContextSucceeded
    SubType: RunInChildContext
    EventId: 6
    Id: ${CTX1}
    EventTimestamp: '*'
    ContextSucceededDetails:
      Result:
        Payload: '"${INPUT_1}"'
  - EventType: InvocationCompleted
    EventId: 7
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
