---
# 7.13: Wait-for-callback with heartbeat then success
description: Wait-for-callback with a heartbeat timeout where the external system sends
  a heartbeat to reset the timer, then later completes the callback with success
async: true
handler: |
  Handler runs a single wait_for_callback operation using the input as the operation name, configured
  with a 10-second heartbeat timeout. The submitter completes and the operation suspends. The external
  system first sends a heartbeat (which resets the heartbeat timer, producing no history event), then
  completes the callback with a success payload which becomes the operation result.
invocations: |
  - Fresh invoke: SDK checkpoints ContextStarted (SubType WaitForCallback), creates the inner callback (CallbackStarted with HeartbeatTimeout=10, ParentId pointing to the operation Id), runs the submitter step (StepStarted/StepSucceeded, ParentId pointing to the operation Id), the invocation completes and execution suspends.
  - Replay 1: The external system sent a heartbeat (no history event) then a success callback. SDK checkpoints CallbackSucceeded with the payload, then ContextSucceeded, and execution succeeds.
AsyncInvoke: true
Variables:
  CB_NAME: ${GEN_STR:10}
  CB_PAYLOAD: ${GEN_STR:12}
Input: ${CB_NAME}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
CallbackActions:
  - CallbackName: '*'
    Operation: heartbeat
  - CallbackName: '*'
    Operation: success
    Payload: ${CB_PAYLOAD}
    Delay: 1
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: WaitForCallback
    EventId: 2
    Id: ${ID1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 3
    Id: ${CB1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
      HeartbeatTimeout: 10
  - EventType: StepStarted
    SubType: Step
    EventId: 4
    Id: ${STEP1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: '*'
  - EventType: StepSucceeded
    SubType: Step
    EventId: 5
    Id: ${STEP1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackSucceeded
    SubType: Callback
    EventId: 7
    Id: ${CB1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    CallbackSucceededDetails:
      Result:
        Payload: '"${CB_PAYLOAD}"'
  - EventType: ContextSucceeded
    SubType: WaitForCallback
    EventId: 8
    Id: ${ID1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 9
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionSucceeded
    EventId: 10
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result: '*'
