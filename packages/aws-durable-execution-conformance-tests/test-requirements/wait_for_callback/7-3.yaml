---
# 7.3: Wait-for-callback with anonymous submitter (no name)
description: Wait-for-callback invoked with only a submitter function and no operation
  name — the operation gets an auto-generated id and no Name
async: true
handler: |
  Handler runs a single wait_for_callback operation providing only an inline (anonymous) submitter
  function and no name. The submitter completes, the operation suspends, and the external system
  completes the callback with a success payload which becomes the operation result.
invocations: |
  - Fresh invoke: SDK checkpoints ContextStarted (SubType WaitForCallback) with no Name, creates the inner callback (CallbackStarted, ParentId pointing to the operation Id), runs the submitter step (StepStarted/StepSucceeded, ParentId pointing to the operation Id), the invocation completes and execution suspends.
  - Replay 1: External system completed the callback. SDK checkpoints CallbackSucceeded with the payload, then ContextSucceeded, and execution succeeds.
AsyncInvoke: true
Variables:
  CB_PAYLOAD: ${GEN_STR:12}
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
CallbackActions:
  - CallbackName: '*'
    Operation: success
    Payload: ${CB_PAYLOAD}
    Delay: 1
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: WaitForCallback
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 3
    Id: ${CB1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
  - EventType: StepStarted
    SubType: Step
    EventId: 4
    Id: ${STEP1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: '*'
  - EventType: StepSucceeded
    SubType: Step
    EventId: 5
    Id: ${STEP1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackSucceeded
    SubType: Callback
    EventId: 7
    Id: ${CB1}
    ParentId: ${ID1}
    EventTimestamp: '*'
    CallbackSucceededDetails:
      Result:
        Payload: '"${CB_PAYLOAD}"'
  - EventType: ContextSucceeded
    SubType: WaitForCallback
    EventId: 8
    Id: ${ID1}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 9
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionSucceeded
    EventId: 10
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result: '*'
