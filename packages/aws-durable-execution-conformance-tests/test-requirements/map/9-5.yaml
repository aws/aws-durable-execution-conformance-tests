---
# 9.5: Map fail-fast via tolerated-failure-count=0 stops after first failure
description: Map configured with a fail-fast completion config (tolerated-failure-count=0) stops on
  the first item failure and does not start remaining items
handler: |
  Handler invokes the map operation over three items with a fail-fast completion config
  (tolerated-failure-count=0). Max-concurrency is 1 so items run sequentially: item 0 returns "ok"
  and succeeds, item 1 raises an error and fails, at which point fail-fast stops the operation and
  item 2 is never started. The map operation itself does not raise; it returns a batch result. The
  handler returns a projection {completionReason, status, successCount, failureCount, totalCount}.
  Because a failure occurred, status is FAILED and completion reason is FAILURE_TOLERANCE_EXCEEDED.
invocations: |
  - Handler invokes map(name="failfast", items=[i0, i1, i2], mapFunc, max-concurrency=1, completion
    config tolerated-failure-count=0). The SDK checkpoints ContextStarted (SubType Map). Item 0
    runs and succeeds (ContextStarted / ContextSucceeded, SubType MapIteration). Item 1 runs and
    fails (ContextStarted / ContextFailed, SubType MapIteration). Fail-fast stops the operation
    without starting item 2. The SDK checkpoints ContextSucceeded (SubType Map) carrying the batch
    summary, and the invocation completes returning the projection object.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result:
    completionReason: FAILURE_TOLERANCE_EXCEEDED
    status: FAILED
    successCount: 1
    failureCount: 1
    totalCount: 2
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Map
    EventId: 2
    Id: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: MapIteration
    EventId: 3
    Id: ${ITER0}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextSucceeded
    SubType: MapIteration
    EventId: 4
    Id: ${ITER0}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextSucceededDetails:
      Result:
        Payload: '"ok"'
  - EventType: ContextStarted
    SubType: MapIteration
    EventId: 5
    Id: ${ITER1}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: MapIteration
    EventId: 6
    Id: ${ITER1}
    ParentId: ${CTX_M}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextSucceeded
    SubType: Map
    EventId: 7
    Id: ${CTX_M}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
