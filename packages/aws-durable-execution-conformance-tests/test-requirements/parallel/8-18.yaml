---
# 8.18: Parallel with combined completion config (min-successful + tolerated-failure-count)
description: Parallel configured with both min-successful and tolerated-failure-count; the failure
  tolerance is exceeded first and stops the operation
handler: |
  Handler invokes the parallel operation with four branches, max-concurrency 1, and a completion
  config combining min-successful=3 and tolerated-failure-count=1. Branch 0 fails (failure count 1,
  within tolerance), branch 1 fails (failure count 2, exceeding the tolerance of 1). The failure
  tolerance is exceeded before the min-successful target could be met, so the operation stops and
  branches 2 and 3 are never started. The completion reason is FAILURE_TOLERANCE_EXCEEDED. The
  handler returns a projection {completionReason, successCount, failureCount, totalCount}.
invocations: |
  - Handler invokes parallel(name="combined", branches=[b0, b1, b2, b3], max-concurrency=1,
    completion config min-successful=3 and tolerated-failure-count=1). The SDK checkpoints
    ContextStarted (SubType Parallel), then branch 0 fails (ContextStarted / ContextFailed) and
    branch 1 fails (ContextStarted / ContextFailed), all SubType ParallelBranch. The failure
    tolerance is exceeded so the operation stops without starting branches 2 and 3. The SDK
    checkpoints ContextSucceeded (SubType Parallel) and the invocation completes returning the
    projection object.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result:
    completionReason: FAILURE_TOLERANCE_EXCEEDED
    successCount: 0
    failureCount: 2
    totalCount: 2
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Parallel
    EventId: 2
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 3
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 4
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 5
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 6
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextSucceeded
    SubType: Parallel
    EventId: 7
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
