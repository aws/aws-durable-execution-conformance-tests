---
# 8.13: Parallel tolerated-failure-percentage exceeded (stops early)
description: Parallel stops early once the failure percentage exceeds the tolerated-failure-percentage
handler: |
  Handler invokes the parallel operation with four branches and a completion config of
  tolerated-failure-percentage=25. The tolerated failure percentage is computed against the total
  branch count (4). Max-concurrency is 1 so branches run sequentially: branch 0 fails (1/4 = 25%,
  not exceeding 25), branch 1 also fails (2/4 = 50%, now exceeding 25), so the operation stops
  early and branches 2 and 3 are never started. The handler returns a projection
  {completionReason, successCount, failureCount, totalCount}. Completion reason is
  FAILURE_TOLERANCE_EXCEEDED.
invocations: |
  - Handler invokes parallel(name="tolerated-pct", branches=[b0, b1, b2, b3], max-concurrency=1,
    completion config tolerated-failure-percentage=25). The SDK checkpoints ContextStarted
    (SubType Parallel), then branch 0 fails (ContextStarted / ContextFailed) and branch 1 fails
    (ContextStarted / ContextFailed), all SubType ParallelBranch. The failure percentage now
    exceeds the tolerance so the operation stops without starting the remaining branches. The SDK
    checkpoints ContextSucceeded (SubType Parallel) and the invocation completes returning the
    projection object.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result:
    completionReason: FAILURE_TOLERANCE_EXCEEDED
    successCount: 0
    failureCount: 2
    totalCount: 2
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Parallel
    EventId: 2
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 3
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 4
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 5
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 6
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextSucceeded
    SubType: Parallel
    EventId: 7
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
