---
# 8.9: Parallel tolerated-failure-count within tolerance (all branches complete)
description: Parallel with a tolerated-failure-count tolerating one failure completes all branches
handler: |
  Handler invokes the parallel operation with three branches and a completion config of
  tolerated-failure-count=1. Max-concurrency is 1 so branches run sequentially: branch 0
  succeeds, branch 1 raises an error and fails, branch 2 succeeds. Because the failure count (1)
  does not exceed the tolerated failure count (1), the operation does not stop early and all
  branches complete. The handler returns a projection {completionReason, status, successCount,
  failureCount, totalCount}. Completion reason is ALL_COMPLETED, but status is FAILED because at
  least one branch failed.
invocations: |
  - Handler invokes parallel(name="tolerated", branches=[b0, b1, b2], max-concurrency=1,
    completion config tolerated-failure-count=1). The SDK checkpoints ContextStarted (SubType
    Parallel), then branch 0 succeeds (ContextStarted / ContextSucceeded), branch 1 fails
    (ContextStarted / ContextFailed), and branch 2 succeeds (ContextStarted / ContextSucceeded),
    all SubType ParallelBranch. The SDK checkpoints ContextSucceeded (SubType Parallel) and the
    invocation completes returning the projection object.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result:
    completionReason: ALL_COMPLETED
    status: FAILED
    successCount: 2
    failureCount: 1
    totalCount: 3
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Parallel
    EventId: 2
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 3
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextSucceeded
    SubType: ParallelBranch
    EventId: 4
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 5
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 6
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 7
    Id: ${CTX_B3}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextSucceeded
    SubType: ParallelBranch
    EventId: 8
    Id: ${CTX_B3}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: ContextSucceeded
    SubType: Parallel
    EventId: 9
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 10
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
