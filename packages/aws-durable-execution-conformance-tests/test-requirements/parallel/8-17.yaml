---
# 8.17: Parallel min-successful not reached (all branches run, insufficient successes)
description: Parallel with a min-successful threshold that is never reached runs all branches and
  completes with ALL_COMPLETED and status FAILED
handler: |
  Handler invokes the parallel operation with three branches, max-concurrency 1, and a completion
  config of min-successful=3. Branch 0 succeeds, branch 1 fails, branch 2 succeeds. Only two
  branches succeed, so the min-successful threshold (3) is never reached; there is no failure
  tolerance configured, so failures do not stop execution and all three branches run. The completion
  reason is ALL_COMPLETED and the status is FAILED (a failure occurred). The handler returns a
  projection {completionReason, status, successCount, failureCount, totalCount}.
invocations: |
  - Handler invokes parallel(name="min-not-reached", branches=[b0, b1, b2], max-concurrency=1,
    completion config min-successful=3). The SDK checkpoints ContextStarted (SubType Parallel), then
    branch 0 succeeds (ContextStarted / ContextSucceeded), branch 1 fails (ContextStarted /
    ContextFailed), branch 2 succeeds (ContextStarted / ContextSucceeded), all SubType ParallelBranch.
    The SDK checkpoints ContextSucceeded (SubType Parallel) and the invocation completes returning the
    projection object.
Input: null
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result:
    completionReason: ALL_COMPLETED
    status: FAILED
    successCount: 2
    failureCount: 1
    totalCount: 3
ExpectedExecutionHistory:
  - EventType: ContextStarted
    SubType: Parallel
    EventId: 2
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 3
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextSucceeded
    SubType: ParallelBranch
    EventId: 4
    Id: ${CTX_B1}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 5
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextFailed
    SubType: ParallelBranch
    EventId: 6
    Id: ${CTX_B2}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextFailedDetails:
      Error: {}
  - EventType: ContextStarted
    SubType: ParallelBranch
    EventId: 7
    Id: ${CTX_B3}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextStartedDetails: {}
  - EventType: ContextSucceeded
    SubType: ParallelBranch
    EventId: 8
    Id: ${CTX_B3}
    ParentId: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: ContextSucceeded
    SubType: Parallel
    EventId: 9
    Id: ${CTX_P}
    EventTimestamp: '*'
    ContextSucceededDetails: '*'
  - EventType: InvocationCompleted
    EventId: 10
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
