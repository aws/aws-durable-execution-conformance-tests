---
# 4.11: Callback + Wait + Wait for callback result (timeout)
description: createCallback (3s timeout) then 6s wait then await — callback times
  out during the wait
async: true
handler: |
  Handler creates a callback using the input as the callback name with a 3-second timeout, then waits for 6 seconds, then blocks on the callback result.
  No external callback is sent. The callback times out at t=3s while the lambda is still suspended for the wait, then the wait completes at t=6s, then the handler re-invokes and the callback raises CallbackTimeoutError.
invocations: |
  - Handler creates a callback with a 3-second timeout, then starts a 6-second wait, then blocks on the callback result. The SDK checkpoints CallbackStarted (Timeout=3) and WaitStarted (6s). The invocation completes and execution suspends.
  - Replay 1: Callback timed out at t=3s. The SDK replays state, sees the wait still pending, and the invocation completes.
  - Replay 2: Wait completed at t=6s. The SDK replays both operations, the callback raises CallbackTimeoutError to the handler, and execution fails with CallbackError.
AsyncInvoke: true
Variables:
  CB_NAME: ${GEN_STR:10}
Input: ${CB_NAME}
ExpectedResult:
  ExecutionStatus: FAILED
# No CallbackActions — let the callback time out
ExpectedExecutionHistory:
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 2
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
      Timeout: 3
  - EventType: WaitStarted
    SubType: Wait
    EventId: 3
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: 6
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackTimedOut
    SubType: Callback
    EventId: 5
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackTimedOutDetails:
      Error:
        Payload:
          ErrorType: Callback.Timeout
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 7
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: 6
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionFailed
    EventId: 9
    EventTimestamp: '*'
    ExecutionFailedDetails:
      Error:
        Payload:
          ErrorType: '*'
