---
# 4.13: Replay — Callback failure caught → Wait → return
description: Handler catches a callback failure and continues with a wait, verifying
  replay across 3 invocations
async: true
handler: |
  Handler creates a callback using the input as the callback name, blocks on the callback result with error handling, and on failure stores an error message.
  Then starts a 2-second wait, then returns the message.
  The callback failed and error caught by the handler.
invocations: |
  - Handler creates a callback and blocks on the callback result with error handling. The SDK checkpoints CallbackStarted. The invocation completes and execution suspends.
  - Replay 1: Received callback failure. The SDK replays CallbackFailed, raises the error but the handler catches it, then starts a 2-second wait. The SDK checkpoints WaitStarted. The invocation completes and execution suspends.
  - Replay 2: Wait completed. The SDK replays the callback failure (caught) and wait as done, the handler returns the error message, and execution succeeds.
AsyncInvoke: true
Variables:
  CB_NAME: ${GEN_STR:10}
Input: ${CB_NAME}
ExpectedResult:
  ExecutionStatus: SUCCEEDED
CallbackActions:
  - CallbackName: ${CB_NAME}
    Operation: failure
    Payload:
      ErrorType: RejectedError
      ErrorMessage: not approved
    Delay: 1
ExpectedExecutionHistory:
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 2
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
  - EventType: InvocationCompleted
    EventId: 3
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackFailed
    SubType: Callback
    EventId: 4
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackFailedDetails:
      Error:
        Payload:
          ErrorType: RejectedError
          ErrorMessage: not approved
  - EventType: WaitStarted
    SubType: Wait
    EventId: 5
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: 2
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 7
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: 2
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionSucceeded
    EventId: 9
    EventTimestamp: '*'
    ExecutionSucceededDetails:
      Result: '*'
