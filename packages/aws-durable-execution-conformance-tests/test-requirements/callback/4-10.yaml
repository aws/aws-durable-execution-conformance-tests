---
# 4.10: Callback + Wait + Wait for callback result (failure)
description: createCallback then 5s wait then await for callback result — external
  system reports failure during the wait
async: true
handler: |
  Handler creates a callback using the input as the callback name, then waits for 5 seconds, then blocks on the callback result.
  The external system reports failure during the wait. This is a 3-invocation flow because the callback resolves during the wait.
invocations: |
  - Handler creates a callback, then starts a 5-second wait, then blocks on the callback result. The SDK checkpoints CallbackStarted and WaitStarted (5s). The invocation completes and execution suspends.
  - Replay 1: Received callback failure. The SDK replays state, sees the wait still pending, and the invocation completes.
  - Replay 2: Wait completed. The SDK replays both operations, the callback raises CallbackError to the handler, and execution fails.
AsyncInvoke: true
Variables:
  CB_NAME: ${GEN_STR:10}
Input: ${CB_NAME}
ExpectedResult:
  ExecutionStatus: FAILED
CallbackActions:
  - CallbackName: ${CB_NAME}
    Operation: failure
    Payload:
      ErrorType: RejectedError
      ErrorMessage: not approved
    Delay: 1
ExpectedExecutionHistory:
  - EventType: CallbackStarted
    SubType: Callback
    EventId: 2
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackStartedDetails:
      CallbackId: '*'
  - EventType: WaitStarted
    SubType: Wait
    EventId: 3
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitStartedDetails:
      Duration: 5
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: CallbackFailed
    SubType: Callback
    EventId: 5
    Id: ${CB1}
    Name: ${CB_NAME}
    EventTimestamp: '*'
    CallbackFailedDetails:
      Error:
        Payload:
          ErrorType: RejectedError
          ErrorMessage: not approved
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: WaitSucceeded
    SubType: Wait
    EventId: 7
    Id: ${WAIT1}
    EventTimestamp: '*'
    WaitSucceededDetails:
      Duration: 5
  - EventType: InvocationCompleted
    EventId: 8
    EventTimestamp: '*'
    InvocationCompletedDetails: '*'
  - EventType: ExecutionFailed
    EventId: 9
    EventTimestamp: '*'
    ExecutionFailedDetails:
      Error:
        Payload:
          ErrorType: '*'
