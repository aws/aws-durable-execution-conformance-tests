---
# 1.3: Sequential steps where second depends on first
description: Sequential steps where second depends on first
handler: |
  Two sequential steps where the second step uses the result of the first.
invocations: |
  - Handler invokes `result1 = context.step(step_one)`, first step succeeds, then invokes `result2 = context.step(step_two(result1))`, second step succeeds using first step's result.
Input:
ExpectedResult:
  ExecutionStatus: SUCCEEDED
  Result: first_second
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: Step
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 4
    Id: ${ID2}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 5
    Id: ${ID2}
    EventTimestamp: '*'
    StepSucceededDetails: {}
  - EventType: InvocationCompleted
    EventId: 6
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
