---
# 1.12: Retry exhaustion (max attempts)
description: Retry exhaustion (max attempts)
handler: |
  A step that always fails, with a retry strategy that allows 4 total attempts (1 initial + 3 retries).
invocations: |
  - Handler invokes `context.step(always_fail, config={ retryStrategy: createRetryStrategy({ maxAttempts: 4, ... }) })`, step throws, SDK checkpoints StepFailed with RetryDetails (CurrentAttempt=1, NextAttemptDelaySeconds=1), invocation completes, execution suspends.
  - Replay 1: Re-invoked because retry delay elapsed, SDK replays, re-executes step, step throws again, SDK checkpoints StepFailed with RetryDetails (CurrentAttempt=2, NextAttemptDelaySeconds=1), invocation completes, execution suspends.
  - Replay 2: Re-invoked because retry delay elapsed, SDK replays, re-executes step, step throws again, SDK checkpoints StepFailed with RetryDetails (CurrentAttempt=3, NextAttemptDelaySeconds=1), invocation completes, execution suspends.
  - Replay 3: Re-invoked because retry delay elapsed, SDK replays, re-executes step, step throws again, SDK checkpoints StepFailed with RetryDetails (CurrentAttempt=4, no NextAttemptDelaySeconds), retries exhausted, execution fails.
Input:
ExpectedResult:
  ExecutionStatus: FAILED
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: Step
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepFailed
    SubType: Step
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepFailedDetails:
      Error:
        Payload: {}
      RetryDetails:
        CurrentAttempt: 1
        NextAttemptDelaySeconds: 1
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 5
