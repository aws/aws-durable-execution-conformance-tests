---
# 1.15: Retry specific exception
description: Retry specific exception
handler: |
  A step that throws a custom TransientError on the first attempt. The retry strategy retries only when the error is an instance of TransientError.
invocations: |
  - Handler invokes `context.step(func, { retryStrategy: retry_on_transient })`, step throws TransientError, strategy checks error type, returns shouldRetry=true, invocation completes, execution suspends.
  - Replay 1: Re-invoked because retry delay elapsed, SDK replays, re-executes step, step succeeds, execution succeeds.
Input:
ExpectedResult:
  ExecutionStatus: SUCCEEDED
ExpectedExecutionHistory:
  - EventType: StepStarted
    SubType: Step
    EventId: 2
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepFailed
    SubType: Step
    EventId: 3
    Id: ${ID1}
    EventTimestamp: '*'
    StepFailedDetails:
      Error:
        Payload:
          ErrorMessage: '*'
          ErrorType: ${/.*TransientError$/}
      RetryDetails:
        CurrentAttempt: 1
        NextAttemptDelaySeconds: 1
  - EventType: InvocationCompleted
    EventId: 4
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
  - EventType: StepStarted
    SubType: Step
    EventId: 5
    Id: ${ID1}
    EventTimestamp: '*'
    StepStartedDetails: {}
  - EventType: StepSucceeded
    SubType: Step
    EventId: 6
    Id: ${ID1}
    EventTimestamp: '*'
    StepSucceededDetails:
      RetryDetails:
        CurrentAttempt: 2
  - EventType: InvocationCompleted
    EventId: 7
    EventTimestamp: '*'
    InvocationCompletedDetails: {}
