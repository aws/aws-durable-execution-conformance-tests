AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Java SDK examples for the durable execution OTel conformance suite

Parameters:
  LambdaExecutionRoleArn:
    Type: String
    Description: Pre-created execution role for the test functions
  OtelLayerArn:
    Type: String
    Description: AWSOpenTelemetryDistroJava Lambda layer used to export OpenTelemetry spans
  OtelExecWrapper:
    Type: String
    Default: /opt/otel-instrument
    Description: AWSOpenTelemetryDistroJava wrapper that initializes the Java agent
  OtelServiceName:
    Type: String
    Default: invocation
    Description: OpenTelemetry service name used to find the exported trace
  OtelTracesExporter:
    Type: String
    Default: otlp
    Description: OpenTelemetry traces exporter selected by the runner
  OtelExporterEndpoint:
    Type: String
    Default: ""
    Description: Non-secret OTLP endpoint used by community exporters
  OtelExporterHeaders:
    Type: String
    Default: ""
    NoEcho: true
    Description: Secret OTLP exporter headers supplied by the runner
  OtelSecretEnvironmentNames:
    Type: String
    Default: ""
    Description: Comma-separated secret environment variable names

Globals:
  Function:
    Runtime: java21
    Architectures:
      - x86_64
    Timeout: 60
    MemorySize: 1024
    Tracing: Active
    Layers:
      - !Ref OtelLayerArn
    DurableConfig:
      ExecutionTimeout: 300
      RetentionPeriodInDays: 1
    Environment:
      Variables:
        OTEL_SERVICE_NAME: !Ref OtelServiceName
        OTEL_TRACES_EXPORTER: !Ref OtelTracesExporter
        OTEL_EXPORTER_OTLP_ENDPOINT: !Ref OtelExporterEndpoint
        OTEL_EXPORTER_OTLP_HEADERS: !Ref OtelExporterHeaders
        OTEL_EXPORTER_OTLP_PROTOCOL: grpc
        OTEL_PROPAGATORS: xray
        AWS_LAMBDA_EXEC_WRAPPER: !Ref OtelExecWrapper

Resources:
  Otel1Success:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
        - otel-1
    Properties:
      CodeUri: .
      Handler: software.amazon.lambda.durable.conformance.otel.Otel1Success
      FunctionName: !Sub "${AWS::StackName}-otel-1"
      Role: !Ref LambdaExecutionRoleArn

  Otel2WaitResume:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
        - otel-2
