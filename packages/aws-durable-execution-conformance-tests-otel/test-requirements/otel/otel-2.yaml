description: OpenTelemetry emits every wait, resume, and post-resume step span
Input:
  scenario: wait-resume
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: WaitStarted
    SubType: Wait
    Id: ${WAIT1}
    Name: otel-wait
  - EventId: 5
    EventType: StepStarted
    SubType: Step
    Id: ${STEP1}
    Name: otel-after-resume
  - EventId: 6
    EventType: StepSucceeded
    SubType: Step
    Id: ${STEP1}
    Name: otel-after-resume
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 7
  minimum_invocations: 2
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      count: 2
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: invocation
          span.kind: SERVER
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-wait
        attributes:
          durable.operation.status: STARTED
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: otel-wait
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${WAIT1}
          durable.operation.type: WAIT
          durable.operation.subtype: Wait
          durable.operation.status: STARTED
          durable.operation.name: otel-wait
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-wait
        attributes:
          durable.operation.status: SUCCEEDED
      expect:
        status: OK
        service_name: invocation
        links:
          - trace_id: "${/^[0-9a-f]{32}$/}"
            span_id: "${/^[0-9a-f]{16}$/}"
        attributes:
          span.name: otel-wait
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${WAIT1}
          durable.operation.type: WAIT
          durable.operation.subtype: Wait
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-wait
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-after-resume
        attributes:
          durable.operation.status: SUCCEEDED
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-after-resume
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP1}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-after-resume
          durable.attempt.number: 1
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-after-resume attempt 1
        attributes:
          durable.attempt.number: 1
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-after-resume attempt 1
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP1}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-after-resume
          durable.attempt.number: 1
          durable.attempt.outcome: SUCCEEDED
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
