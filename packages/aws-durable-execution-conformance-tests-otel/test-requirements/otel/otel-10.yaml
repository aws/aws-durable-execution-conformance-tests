description: OpenTelemetry emits complete wait-for-callback context, callback, and submitter spans
Input:
  scenario: wait-for-callback
AsyncInvoke: true
CallbackActions:
  - CallbackName: "${/^otel-callback(?: create callback id|-callback)$/}"
    Operation: success
    Payload: callback-complete
    Delay: 1
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: ContextStarted
    SubType: WaitForCallback
    Id: ${CALLBACK_CONTEXT}
    Name: otel-callback
  - EventId: 3
    EventType: CallbackStarted
    SubType: Callback
    Id: ${CALLBACK1}
    ParentId: ${CALLBACK_CONTEXT}
    Name: "${/^otel-callback(?: create callback id|-callback)$/}"
  - EventId: 4
    EventType: StepStarted
    SubType: Step
    Id: ${SUBMITTER_STEP}
    ParentId: ${CALLBACK_CONTEXT}
    Name: "${/^otel-callback(?: submitter|-submitter)$/}"
  - EventId: 5
    EventType: StepSucceeded
    SubType: Step
    Id: ${SUBMITTER_STEP}
    ParentId: ${CALLBACK_CONTEXT}
    Name: "${/^otel-callback(?: submitter|-submitter)$/}"
  - EventId: 8
    EventType: ContextSucceeded
    SubType: WaitForCallback
    Id: ${CALLBACK_CONTEXT}
    Name: otel-callback
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 9
  minimum_invocations: 2
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      count: 2
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-callback
        attributes:
          durable.operation.subtype: WaitForCallback
      count: 2
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${CALLBACK_CONTEXT}
          durable.operation.type: CONTEXT
          durable.operation.subtype: WaitForCallback
          durable.operation.status: STARTED
          durable.operation.name: otel-callback
        parent:
          name: invocation
          attributes:
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: "${/^otel-callback(?: create callback id|-callback)$/}"
        attributes:
          durable.operation.status: STARTED
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${CALLBACK1}
          durable.operation.type: CALLBACK
          durable.operation.subtype: Callback
          durable.operation.status: STARTED
          durable.operation.name: "${/^otel-callback(?: create callback id|-callback)$/}"
        parent:
          name: otel-callback
          attributes:
            durable.operation.id: ${CALLBACK_CONTEXT}
            durable.operation.subtype: WaitForCallback
    - select:
        name: "${/^otel-callback(?: create callback id|-callback)$/}"
        attributes:
          durable.operation.status: SUCCEEDED
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${CALLBACK1}
          durable.operation.type: CALLBACK
          durable.operation.subtype: Callback
          durable.operation.status: SUCCEEDED
          durable.operation.name: "${/^otel-callback(?: create callback id|-callback)$/}"
        parent:
          name: otel-callback
          attributes:
            durable.operation.id: ${CALLBACK_CONTEXT}
            durable.operation.subtype: WaitForCallback
    - select:
        name: "${/^otel-callback(?: submitter|-submitter)$/}"
        attributes:
          durable.operation.status: SUCCEEDED
      count: 2
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${SUBMITTER_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: SUCCEEDED
          durable.operation.name: "${/^otel-callback(?: submitter|-submitter)$/}"
          durable.attempt.number: 1
        parent:
          name: otel-callback
          attributes:
            durable.operation.id: ${CALLBACK_CONTEXT}
            durable.operation.subtype: WaitForCallback
    - select:
        name: "${/^otel-callback(?: submitter|-submitter) attempt 1$/}"
        attributes:
          durable.attempt.number: 1
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${SUBMITTER_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: "${/^otel-callback(?: submitter|-submitter)$/}"
          durable.attempt.number: 1
          durable.attempt.outcome: SUCCEEDED
        parent:
          name: otel-callback
          attributes:
            durable.operation.id: ${CALLBACK_CONTEXT}
            durable.operation.subtype: WaitForCallback
