description: OpenTelemetry emits every failed and successful retry attempt across invocations
Input:
  scenario: retry
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: StepStarted
    SubType: Step
    Id: ${RETRY_STEP}
    Name: otel-retry
  - EventId: 3
    EventType: StepFailed
    SubType: Step
    Id: ${RETRY_STEP}
    Name: otel-retry
  - EventId: 5
    EventType: StepStarted
    SubType: Step
    Id: ${RETRY_STEP}
    Name: otel-retry
  - EventId: 6
    EventType: StepSucceeded
    SubType: Step
    Id: ${RETRY_STEP}
    Name: otel-retry
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 6
  minimum_invocations: 2
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      count: 2
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: invocation
          span.kind: SERVER
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-retry
        attributes:
          durable.operation.status: STARTED
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: otel-retry
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${RETRY_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-retry
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-retry attempt 1
        attributes:
          durable.attempt.number: 1
      expect:
        status: ERROR
        service_name: invocation
        links: []
        attributes:
          span.name: otel-retry attempt 1
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${RETRY_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-retry
          durable.attempt.number: 1
          durable.attempt.outcome: FAILED
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-retry
        attributes:
          durable.operation.status: SUCCEEDED
      expect:
        status: OK
        service_name: invocation
        links:
          - name: otel-retry
            attributes:
              durable.operation.id: ${RETRY_STEP}
        attributes:
          span.name: otel-retry
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${RETRY_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-retry
          durable.attempt.number: 2
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-retry attempt 2
        attributes:
          durable.attempt.number: 2
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-retry attempt 2
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${RETRY_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-retry
          durable.attempt.number: 2
          durable.attempt.outcome: SUCCEEDED
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
