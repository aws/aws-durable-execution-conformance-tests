description: OpenTelemetry emits complete chained-invoke continuation spans
Input:
  scenario: chained-invoke
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: ChainedInvokeStarted
    SubType: ChainedInvoke
    Id: ${INVOKE1}
    Name: otel-invoke
    ChainedInvokeStartedDetails:
      DurableExecutionArn: ${TARGET_EXECUTION_ARN}
  - EventId: 4
    EventType: ChainedInvokeSucceeded
    SubType: ChainedInvoke
    Id: ${INVOKE1}
    Name: otel-invoke
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 5
  minimum_invocations: 3
  require_execution_correlation: true
  allowed_execution_arns:
    - ${EXECUTION_ARN}
    - ${TARGET_EXECUTION_ARN}
  require_all_spans: true
  span_assertion_scope:
    - attributes:
        durable.execution.arn: ${EXECUTION_ARN}
    - attributes:
        durable.execution.arn: ${TARGET_EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      count: 2
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: invocation
          span.kind: SERVER
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${TARGET_EXECUTION_ARN}
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: invocation
          span.kind: SERVER
          durable.execution.arn: ${TARGET_EXECUTION_ARN}
    - select:
        name: otel-invoke
        attributes:
          durable.operation.status: STARTED
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: otel-invoke
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${INVOKE1}
          durable.operation.type: CHAINED_INVOKE
          durable.operation.subtype: ChainedInvoke
          durable.operation.status: STARTED
          durable.operation.name: otel-invoke
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-invoke
        attributes:
          durable.operation.status: SUCCEEDED
      expect:
        status: OK
        service_name: invocation
        links:
          - trace_id: "${/^[0-9a-f]{32}$/}"
            span_id: "${/^[0-9a-f]{16}$/}"
        attributes:
          span.name: otel-invoke
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${INVOKE1}
          durable.operation.type: CHAINED_INVOKE
          durable.operation.subtype: ChainedInvoke
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-invoke
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
