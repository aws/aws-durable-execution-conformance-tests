description: OpenTelemetry emits complete chained-invoke continuation spans
Input:
  scenario: chained-invoke
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: ChainedInvokeStarted
    SubType: ChainedInvoke
    Id: ${INVOKE1}
    Name: otel-invoke
  - EventId: 4
    EventType: ChainedInvokeSucceeded
    SubType: ChainedInvoke
    Id: ${INVOKE1}
    Name: otel-invoke
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 5
  minimum_invocations: 3
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      count: 3
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-invoke
        attributes:
          durable.operation.status: STARTED
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${INVOKE1}
          durable.operation.type: CHAINED_INVOKE
          durable.operation.subtype: ChainedInvoke
          durable.operation.status: STARTED
          durable.operation.name: otel-invoke
        parent:
          name: invocation
          attributes:
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-invoke
        attributes:
          durable.operation.status: SUCCEEDED
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${INVOKE1}
          durable.operation.type: CHAINED_INVOKE
          durable.operation.subtype: ChainedInvoke
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-invoke
        parent:
          name: invocation
          attributes:
            durable.execution.arn: ${EXECUTION_ARN}
