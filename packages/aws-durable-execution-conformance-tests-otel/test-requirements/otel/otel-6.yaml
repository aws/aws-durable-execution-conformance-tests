description: OpenTelemetry emits every parallel context, branch, step, and attempt span
Input:
  scenario: parallel-hierarchy
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: ContextStarted
    SubType: Parallel
    Id: ${PARALLEL1}
    Name: otel-parallel
  - EventId: 3
    EventType: ContextStarted
    SubType: ParallelBranch
    Id: ${BRANCH1}
    ParentId: ${PARALLEL1}
    Name: otel-parallel-branch-a
  - EventId: 4
    EventType: StepStarted
    SubType: Step
    Id: ${STEP1}
    ParentId: ${BRANCH1}
    Name: otel-parallel-step-a
  - EventId: 7
    EventType: ContextStarted
    SubType: ParallelBranch
    Id: ${BRANCH2}
    ParentId: ${PARALLEL1}
    Name: otel-parallel-branch-b
  - EventId: 8
    EventType: StepStarted
    SubType: Step
    Id: ${STEP2}
    ParentId: ${BRANCH2}
    Name: otel-parallel-step-b
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 8
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.invocation.first: true
          durable.invocation.status: SUCCEEDED
      expect:
        status: UNSET
        service_name: invocation
        links: []
        attributes:
          span.name: invocation
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.invocation.first: true
          durable.invocation.status: SUCCEEDED
    - select:
        name: otel-parallel
        attributes:
          durable.operation.subtype: Parallel
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-parallel
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${PARALLEL1}
          durable.operation.type: CONTEXT
          durable.operation.subtype: Parallel
          durable.operation.status: STARTED
          durable.operation.name: otel-parallel
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: INTERNAL
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-parallel-branch-a
        attributes:
          durable.operation.subtype: ParallelBranch
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-parallel-branch-a
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${BRANCH1}
          durable.operation.type: CONTEXT
          durable.operation.subtype: ParallelBranch
          durable.operation.status: STARTED
          durable.operation.name: otel-parallel-branch-a
        parent:
          name: otel-parallel
          attributes:
            span.name: otel-parallel
            span.kind: INTERNAL
            durable.operation.id: ${PARALLEL1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: Parallel
    - select:
        name: otel-parallel-step-a
        attributes:
          durable.operation.type: STEP
          durable.operation.status: SUCCEEDED
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-parallel-step-a
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP1}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-parallel-step-a
          durable.attempt.number: 1
        parent:
          name: otel-parallel-branch-a
          attributes:
            span.name: otel-parallel-branch-a
            span.kind: INTERNAL
            durable.operation.id: ${BRANCH1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: ParallelBranch
    - select:
        name: otel-parallel-step-a attempt 1
        attributes:
          durable.attempt.number: 1
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-parallel-step-a attempt 1
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP1}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-parallel-step-a
          durable.attempt.number: 1
          durable.attempt.outcome: SUCCEEDED
        parent:
          name: otel-parallel-branch-a
          attributes:
            span.name: otel-parallel-branch-a
            span.kind: INTERNAL
            durable.operation.id: ${BRANCH1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: ParallelBranch
    - select:
        name: otel-parallel-branch-b
        attributes:
          durable.operation.subtype: ParallelBranch
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-parallel-branch-b
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${BRANCH2}
          durable.operation.type: CONTEXT
          durable.operation.subtype: ParallelBranch
          durable.operation.status: STARTED
          durable.operation.name: otel-parallel-branch-b
        parent:
          name: otel-parallel
          attributes:
            span.name: otel-parallel
            span.kind: INTERNAL
            durable.operation.id: ${PARALLEL1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: Parallel
    - select:
        name: otel-parallel-step-b
        attributes:
          durable.operation.type: STEP
          durable.operation.status: SUCCEEDED
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-parallel-step-b
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP2}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-parallel-step-b
          durable.attempt.number: 1
        parent:
          name: otel-parallel-branch-b
          attributes:
            span.name: otel-parallel-branch-b
            span.kind: INTERNAL
            durable.operation.id: ${BRANCH2}
            durable.operation.type: CONTEXT
            durable.operation.subtype: ParallelBranch
    - select:
        name: otel-parallel-step-b attempt 1
        attributes:
          durable.attempt.number: 1
      expect:
        status: OK
        service_name: invocation
        links: []
        attributes:
          span.name: otel-parallel-step-b attempt 1
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP2}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-parallel-step-b
          durable.attempt.number: 1
          durable.attempt.outcome: SUCCEEDED
        parent:
          name: otel-parallel-branch-b
          attributes:
            span.name: otel-parallel-branch-b
            span.kind: INTERNAL
            durable.operation.id: ${BRANCH2}
            durable.operation.type: CONTEXT
            durable.operation.subtype: ParallelBranch
