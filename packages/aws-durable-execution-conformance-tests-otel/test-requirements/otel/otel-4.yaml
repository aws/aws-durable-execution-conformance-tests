description: OpenTelemetry emits the complete terminal failure hierarchy
Input:
  scenario: terminal-failure
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: StepStarted
    SubType: Step
    Id: ${FAILED_STEP}
    Name: otel-terminal-failure
  - EventId: 3
    EventType: StepFailed
    SubType: Step
    Id: ${FAILED_STEP}
    Name: otel-terminal-failure
ExpectedResult:
  ExecutionStatus: FAILED
TelemetryAssertions:
  minimum_spans: 3
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      expect:
        name: invocation
        status: "${/^(?:ERROR|UNSET)$/}"
        service_name: invocation
        attributes:
          span.name: invocation
          span.kind: SERVER
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-terminal-failure
        attributes:
          durable.operation.status: FAILED
      expect:
        name: otel-terminal-failure
        status: ERROR
        service_name: invocation
        attributes:
          span.name: otel-terminal-failure
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${FAILED_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: FAILED
          durable.operation.name: otel-terminal-failure
          durable.attempt.number: 1
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-terminal-failure attempt 1
        attributes:
          durable.attempt.number: 1
      expect:
        name: otel-terminal-failure attempt 1
        status: ERROR
        service_name: invocation
        attributes:
          span.name: otel-terminal-failure attempt 1
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${FAILED_STEP}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-terminal-failure
          durable.attempt.number: 1
          durable.attempt.outcome: FAILED
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
