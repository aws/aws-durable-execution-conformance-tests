description: OpenTelemetry emits a correlated trace for a successful execution
Input:
  scenario: success
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 1
  require_execution_correlation: true
  required_outcomes:
    - success
