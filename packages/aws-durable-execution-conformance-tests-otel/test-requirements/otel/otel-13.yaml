description: OpenTelemetry emits failed parallel branches with the parallel operation as parent
Input:
  scenario: parallel-failure
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: ContextStarted
    SubType: Parallel
    Id: ${PARALLEL1}
    Name: otel-failed-parallel
  - EventId: 3
    EventType: ContextStarted
    SubType: ParallelBranch
    Id: ${FAILED_BRANCH}
    ParentId: ${PARALLEL1}
    Name: otel-failed-parallel-branch
  - EventId: 4
    EventType: ContextFailed
    SubType: ParallelBranch
    Id: ${FAILED_BRANCH}
    ParentId: ${PARALLEL1}
    Name: otel-failed-parallel-branch
  - EventId: 5
    EventType: ContextSucceeded
    SubType: Parallel
    Id: ${PARALLEL1}
    Name: otel-failed-parallel
ExpectedResult:
  ExecutionStatus: FAILED
TelemetryAssertions:
  minimum_spans: 3
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      expect:
        attributes:
          span.name: invocation
          span.kind: SERVER
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-failed-parallel
        attributes:
          durable.operation.id: ${PARALLEL1}
      expect:
        status: OK
        attributes:
          span.name: otel-failed-parallel
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${PARALLEL1}
          durable.operation.type: CONTEXT
          durable.operation.subtype: Parallel
          durable.operation.status: STARTED
          durable.operation.name: otel-failed-parallel
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-failed-parallel-branch
        attributes:
          durable.operation.id: ${FAILED_BRANCH}
      expect:
        status: ERROR
        attributes:
          span.name: otel-failed-parallel-branch
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${FAILED_BRANCH}
          durable.operation.type: CONTEXT
          durable.operation.subtype: ParallelBranch
          durable.operation.status: STARTED
          durable.operation.name: otel-failed-parallel-branch
        parent:
          name: otel-failed-parallel
          attributes:
            span.name: otel-failed-parallel
            span.kind: INTERNAL
            durable.operation.id: ${PARALLEL1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: Parallel
