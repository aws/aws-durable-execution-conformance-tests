description: OpenTelemetry emits every map context, iteration, step, and attempt span
Input:
  scenario: map-hierarchy
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: ContextStarted
    SubType: Map
    Id: ${MAP1}
    Name: otel-map
  - EventId: 3
    EventType: ContextStarted
    SubType: MapIteration
    Id: ${ITERATION1}
    ParentId: ${MAP1}
    Name: otel-map-iteration-0
  - EventId: 4
    EventType: StepStarted
    SubType: Step
    Id: ${STEP1}
    ParentId: ${ITERATION1}
    Name: otel-map-step-0
  - EventId: 7
    EventType: ContextStarted
    SubType: MapIteration
    Id: ${ITERATION2}
    ParentId: ${MAP1}
    Name: otel-map-iteration-1
  - EventId: 8
    EventType: StepStarted
    SubType: Step
    Id: ${STEP2}
    ParentId: ${ITERATION2}
    Name: otel-map-step-1
ExpectedResult:
  ExecutionStatus: SUCCEEDED
TelemetryAssertions:
  minimum_spans: 8
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-map
        attributes:
          durable.operation.subtype: Map
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${MAP1}
          durable.operation.type: CONTEXT
          durable.operation.subtype: Map
          durable.operation.status: STARTED
          durable.operation.name: otel-map
        parent:
          name: invocation
          attributes:
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-map-iteration-0
        attributes:
          durable.operation.subtype: MapIteration
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${ITERATION1}
          durable.operation.type: CONTEXT
          durable.operation.subtype: MapIteration
          durable.operation.status: STARTED
          durable.operation.name: otel-map-iteration-0
        parent:
          name: otel-map
          attributes:
            durable.operation.id: ${MAP1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: Map
    - select:
        name: otel-map-step-0
        attributes:
          durable.operation.type: STEP
          durable.operation.status: SUCCEEDED
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP1}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-map-step-0
          durable.attempt.number: 1
        parent:
          name: otel-map-iteration-0
          attributes:
            durable.operation.id: ${ITERATION1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: MapIteration
    - select:
        name: otel-map-step-0 attempt 1
        attributes:
          durable.attempt.number: 1
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP1}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-map-step-0
          durable.attempt.number: 1
          durable.attempt.outcome: SUCCEEDED
        parent:
          name: otel-map-iteration-0
          attributes:
            durable.operation.id: ${ITERATION1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: MapIteration
    - select:
        name: otel-map-iteration-1
        attributes:
          durable.operation.subtype: MapIteration
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${ITERATION2}
          durable.operation.type: CONTEXT
          durable.operation.subtype: MapIteration
          durable.operation.status: STARTED
          durable.operation.name: otel-map-iteration-1
        parent:
          name: otel-map
          attributes:
            durable.operation.id: ${MAP1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: Map
    - select:
        name: otel-map-step-1
        attributes:
          durable.operation.type: STEP
          durable.operation.status: SUCCEEDED
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP2}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: SUCCEEDED
          durable.operation.name: otel-map-step-1
          durable.attempt.number: 1
        parent:
          name: otel-map-iteration-1
          attributes:
            durable.operation.id: ${ITERATION2}
            durable.operation.type: CONTEXT
            durable.operation.subtype: MapIteration
    - select:
        name: otel-map-step-1 attempt 1
        attributes:
          durable.attempt.number: 1
      expect:
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${STEP2}
          durable.operation.type: STEP
          durable.operation.subtype: Step
          durable.operation.status: STARTED
          durable.operation.name: otel-map-step-1
          durable.attempt.number: 1
          durable.attempt.outcome: SUCCEEDED
        parent:
          name: otel-map-iteration-1
          attributes:
            durable.operation.id: ${ITERATION2}
            durable.operation.type: CONTEXT
            durable.operation.subtype: MapIteration
