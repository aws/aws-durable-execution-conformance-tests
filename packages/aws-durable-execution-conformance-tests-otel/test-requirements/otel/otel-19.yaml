description: OpenTelemetry emits the invocation span when handler execution fails
Input:
  scenario: execution-failure
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 3
    EventType: ExecutionFailed
ExpectedResult:
  ExecutionStatus: FAILED
TelemetryAssertions:
  minimum_spans: 1
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.invocation.first: true
          durable.invocation.status: RETRY
      expect:
        status: ERROR
        service_name: invocation
        links: []
        kind: INTERNAL
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
          durable.invocation.first: true
          durable.invocation.status: RETRY
