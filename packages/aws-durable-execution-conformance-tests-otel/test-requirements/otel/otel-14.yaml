description: OpenTelemetry emits failed map iterations with the map operation as parent
Input:
  scenario: map-failure
AsyncInvoke: true
ExpectedExecutionHistory:
  - EventId: 1
    EventType: ExecutionStarted
  - EventId: 2
    EventType: ContextStarted
    SubType: Map
    Id: ${MAP1}
    Name: otel-failed-map
  - EventId: 3
    EventType: ContextStarted
    SubType: MapIteration
    Id: ${FAILED_ITERATION}
    ParentId: ${MAP1}
    Name: otel-failed-map-iteration-0
  - EventId: 4
    EventType: ContextFailed
    SubType: MapIteration
    Id: ${FAILED_ITERATION}
    ParentId: ${MAP1}
    Name: otel-failed-map-iteration-0
  - EventId: 5
    EventType: ContextSucceeded
    SubType: Map
    Id: ${MAP1}
    Name: otel-failed-map
ExpectedResult:
  ExecutionStatus: FAILED
TelemetryAssertions:
  minimum_spans: 3
  require_execution_correlation: true
  require_all_spans: true
  span_assertion_scope:
    attributes:
      durable.execution.arn: ${EXECUTION_ARN}
  exact_attribute_prefixes:
    - durable.
  span_assertions:
    - select:
        name: invocation
        attributes:
          durable.execution.arn: ${EXECUTION_ARN}
      expect:
        name: invocation
        status: "${/^(?:ERROR|UNSET)$/}"
        service_name: invocation
        attributes:
          span.name: invocation
          span.kind: SERVER
          durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-failed-map
        attributes:
          durable.operation.id: ${MAP1}
      expect:
        name: otel-failed-map
        status: OK
        service_name: invocation
        attributes:
          span.name: otel-failed-map
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${MAP1}
          durable.operation.type: CONTEXT
          durable.operation.subtype: Map
          durable.operation.status: STARTED
          durable.operation.name: otel-failed-map
        parent:
          name: invocation
          attributes:
            span.name: invocation
            span.kind: SERVER
            durable.execution.arn: ${EXECUTION_ARN}
    - select:
        name: otel-failed-map-iteration-0
        attributes:
          durable.operation.id: ${FAILED_ITERATION}
      expect:
        name: otel-failed-map-iteration-0
        status: ERROR
        service_name: invocation
        attributes:
          span.name: otel-failed-map-iteration-0
          span.kind: INTERNAL
          durable.execution.arn: ${EXECUTION_ARN}
          durable.operation.id: ${FAILED_ITERATION}
          durable.operation.type: CONTEXT
          durable.operation.subtype: MapIteration
          durable.operation.status: STARTED
          durable.operation.name: otel-failed-map-iteration-0
        parent:
          name: otel-failed-map
          attributes:
            span.name: otel-failed-map
            span.kind: INTERNAL
            durable.operation.id: ${MAP1}
            durable.operation.type: CONTEXT
            durable.operation.subtype: Map
