name: New conformance requirement proposal
description: Propose a new conformance test requirement (a new test-requirements/<operation>/*.yaml case).
title: "[Requirement]: "
labels: ["requirement", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to propose a new behavior the conformance suite should cover across SDKs.
  - type: dropdown
    id: operation
    attributes:
      label: Operation / suite
      options:
        - step
        - wait
        - child
        - callback
        - invoke
        - wait_for_condition
        - wait_for_callback
        - parallel
        - map
        - New operation (describe below)
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Behavior to cover
      description: The specific behavior, edge case, or config option this requirement should exercise.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why it matters
      description: What bug class or divergence would this catch? Why is it worth a dedicated requirement?
    validations:
      required: true
  - type: textarea
    id: expectation
    attributes:
      label: Expected cross-SDK behavior
      description: What should compliant SDKs do? Note any known per-language divergences.
    validations:
      required: false
