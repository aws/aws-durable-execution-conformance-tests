name: OpenTelemetry hosted integrations

on:
  workflow_dispatch:
    inputs:
      template:
        description: SDK SAM template path
        required: true
        type: string
      language:
        description: SDK language (java, javascript, or python)
        required: true
        type: choice
        options: [java, javascript, python]
      aws_role_arn:
        description: AWS IAM role assumed through GitHub OIDC
        required: true
        type: string
      aws_region:
        description: AWS region
        required: true
        default: us-west-2
        type: string
      otlp_endpoint:
        description: OTLP ingest endpoint for community-layer jobs
        required: false
        type: string
      collector_query_endpoint:
        description: Query endpoint for the deployed test collector
        required: false
        type: string
      dash0_query_endpoint:
        description: Dash0 trace API endpoint
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  xray:
    name: ADOT + X-Ray
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
      - run: python -m pip install hatch==1.16.5
      - run: hatch run validate --template "${{ inputs.template }}" --language "${{ inputs.language }}" --region "${{ inputs.aws_region }}" --suite otel --otel-exporter adot --otel-backend xray

  datadog:
    name: Community layer + Datadog
    runs-on: ubuntu-latest
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APPLICATION_KEY: ${{ secrets.DD_APPLICATION_KEY }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.DATADOG_OTLP_HEADERS }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
      - run: python -m pip install hatch==1.16.5
      - run: hatch run validate --template "${{ inputs.template }}" --language "${{ inputs.language }}" --region "${{ inputs.aws_region }}" --suite otel --otel-exporter community --otel-backend datadog --otel-endpoint "${{ inputs.otlp_endpoint }}"

  dash0:
    name: Community layer + Dash0
    runs-on: ubuntu-latest
    env:
      DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.DASH0_OTLP_HEADERS }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
      - run: python -m pip install hatch==1.16.5
      - run: hatch run validate --template "${{ inputs.template }}" --language "${{ inputs.language }}" --region "${{ inputs.aws_region }}" --suite otel --otel-exporter community --otel-backend dash0 --otel-endpoint "${{ inputs.otlp_endpoint }}" --otel-backend-endpoint "${{ inputs.dash0_query_endpoint }}"

  collector:
    name: Community layer + test collector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
      - run: python -m pip install hatch==1.16.5
      - run: hatch run validate --template "${{ inputs.template }}" --language "${{ inputs.language }}" --region "${{ inputs.aws_region }}" --suite otel --otel-exporter community --otel-backend collector --otel-endpoint "${{ inputs.otlp_endpoint }}" --otel-backend-endpoint "${{ inputs.collector_query_endpoint }}"
