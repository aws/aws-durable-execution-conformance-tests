name: Python OpenTelemetry

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/python-opentelemetry.yml
      - packages/aws-durable-execution-conformance-tests/**
      - packages/aws-durable-execution-conformance-tests-otel/**
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        default: us-west-2
        type: string
      otlp_endpoint:
        description: OTLP ingest endpoint for community-layer jobs
        required: false
        type: string
      collector_query_endpoint:
        description: Query endpoint for the deployed test collector
        required: false
        type: string
      dash0_query_endpoint:
        description: Dash0 trace API endpoint
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: otel-hosted-integrations-${{ inputs.aws_region || 'us-west-2' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ inputs.aws_region || 'us-west-2' }}
  PYTHON_TEST_TEMPLATE: packages/aws-durable-execution-conformance-tests-otel/examples/python/template.yaml

jobs:
  xray:
    name: ADOT + X-Ray
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEST_NAME: xray
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
          role-session-name: durableExecutionConformanceOtelXRay
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS test account
        env:
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
        run: |
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL_ACCOUNT_ID" != "$TEST_ACCOUNT_ID" ]; then
            echo "Expected AWS account $TEST_ACCOUNT_ID but assumed into $ACTUAL_ACCOUNT_ID"
            exit 1
          fi
          echo "Using AWS test account $ACTUAL_ACCOUNT_ID"
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
      - name: Install Hatch
        run: python -m pip install hatch==1.16.5
      - name: Resolve latest ADOT Python layer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ADOT_LAYER_ARN=$(
            gh api repos/aws-observability/aws-otel-python-instrumentation/releases/latest \
              --jq .body |
              awk -F '|' -v region="$AWS_REGION" '
                $2 ~ "^[[:space:]]*" region "[[:space:]]*$" {
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", $3)
                  print $3
                  exit
                }
              '
          )
          if [ -z "$ADOT_LAYER_ARN" ]; then
            echo "Could not resolve the latest ADOT Python layer for $AWS_REGION"
            exit 1
          fi
          aws lambda get-layer-version-by-arn \
            --arn "$ADOT_LAYER_ARN" \
            --region "$AWS_REGION" \
            --query LayerVersionArn \
            --output text > /dev/null
          echo "Using ADOT Python layer $ADOT_LAYER_ARN"
          echo "ADOT_LAYER_ARN=$ADOT_LAYER_ARN" >> "$GITHUB_ENV"
      - name: Run X-Ray conformance tests
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          hatch run validate \
            --template "$PYTHON_TEST_TEMPLATE" \
            --language python \
            --region "$AWS_REGION" \
            --name "$TEST_NAME" \
            --no-cleanup \
            --suite otel \
            --history-dir "$RUNNER_TEMP/python-otel-history" \
            --report console json junit \
            --report-file "$RUNNER_TEMP/python-otel-xray-report" \
            --fail-on failed+uncovered \
            --parameter-overrides "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN" \
            --otel-exporter adot \
            --otel-layer-arn "$ADOT_LAYER_ARN" \
            --otel-backend xray

      - name: Show Lambda logs
        if: failure()
        run: |
          for case_number in {1..19}; do
            log_group="/aws/lambda/conformance-tests-${TEST_NAME}-otel-${case_number}"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 20m --format short || true
            echo "::endgroup::"
          done
          for case_number in 11 18; do
            log_group="/aws/lambda/conformance-tests-${TEST_NAME}-otel-${case_number}-target"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 20m --format short || true
            echo "::endgroup::"
          done

      - name: Show execution history diagnostics
        if: failure()
        run: |
          shopt -s nullglob
          for artifact in "$RUNNER_TEMP"/python-otel-history/*.json; do
            if [[ "$artifact" == *-otel.json ]]; then
              continue
            fi
            echo "::group::$artifact"
            cat "$artifact"
            echo "::endgroup::"
          done

      - name: Show normalized X-Ray trace diagnostics
        if: failure()
        run: |
          shopt -s nullglob
          for artifact in "$RUNNER_TEMP"/python-otel-history/*-otel.json; do
            echo "::group::$artifact"
            cat "$artifact"
            echo "::endgroup::"
          done

      - name: Upload reports and histories
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-otel-xray-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/python-otel-history/
            ${{ runner.temp }}/python-otel-xray-report.json
            ${{ runner.temp }}/python-otel-xray-report.xml
          if-no-files-found: ignore

  datadog:
    name: Community layer + Datadog
    if: github.event_name == 'workflow_dispatch' && inputs.otlp_endpoint != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APPLICATION_KEY: ${{ secrets.DD_APPLICATION_KEY }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.DATADOG_OTLP_HEADERS }}
      TEST_NAME: datadog
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
          role-session-name: durableExecutionConformanceOtelDatadog
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS test account
        env:
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
        run: |
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL_ACCOUNT_ID" != "$TEST_ACCOUNT_ID" ]; then
            echo "Expected AWS account $TEST_ACCOUNT_ID but assumed into $ACTUAL_ACCOUNT_ID"
            exit 1
          fi
          echo "Using AWS test account $ACTUAL_ACCOUNT_ID"
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
      - name: Install Hatch
        run: python -m pip install hatch==1.16.5
      - name: Run Datadog conformance tests
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          hatch run validate \
            --template "$PYTHON_TEST_TEMPLATE" \
            --language python \
            --region "$AWS_REGION" \
            --name "$TEST_NAME" \
            --no-cleanup \
            --suite otel \
            --parameter-overrides "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN" \
            --otel-exporter community \
            --otel-backend datadog \
            --otel-endpoint "${{ inputs.otlp_endpoint }}"

  dash0:
    name: Community layer + Dash0
    if: github.event_name == 'workflow_dispatch' && inputs.otlp_endpoint != '' && inputs.dash0_query_endpoint != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.DASH0_OTLP_HEADERS }}
      TEST_NAME: dash0
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
          role-session-name: durableExecutionConformanceOtelDash0
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS test account
        env:
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
        run: |
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL_ACCOUNT_ID" != "$TEST_ACCOUNT_ID" ]; then
            echo "Expected AWS account $TEST_ACCOUNT_ID but assumed into $ACTUAL_ACCOUNT_ID"
            exit 1
          fi
          echo "Using AWS test account $ACTUAL_ACCOUNT_ID"
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
      - name: Install Hatch
        run: python -m pip install hatch==1.16.5
      - name: Run Dash0 conformance tests
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          hatch run validate \
            --template "$PYTHON_TEST_TEMPLATE" \
            --language python \
            --region "$AWS_REGION" \
            --name "$TEST_NAME" \
            --no-cleanup \
            --suite otel \
            --parameter-overrides "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN" \
            --otel-exporter community \
            --otel-backend dash0 \
            --otel-endpoint "${{ inputs.otlp_endpoint }}" \
            --otel-backend-endpoint "${{ inputs.dash0_query_endpoint }}"

  collector:
    name: Community layer + test collector
    if: github.event_name == 'workflow_dispatch' && inputs.otlp_endpoint != '' && inputs.collector_query_endpoint != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEST_NAME: collector
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
          role-session-name: durableExecutionConformanceOtelCollector
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS test account
        env:
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
        run: |
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL_ACCOUNT_ID" != "$TEST_ACCOUNT_ID" ]; then
            echo "Expected AWS account $TEST_ACCOUNT_ID but assumed into $ACTUAL_ACCOUNT_ID"
            exit 1
          fi
          echo "Using AWS test account $ACTUAL_ACCOUNT_ID"
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
      - name: Install Hatch
        run: python -m pip install hatch==1.16.5
      - name: Run collector conformance tests
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          hatch run validate \
            --template "$PYTHON_TEST_TEMPLATE" \
            --language python \
            --region "$AWS_REGION" \
            --name "$TEST_NAME" \
            --no-cleanup \
            --suite otel \
            --parameter-overrides "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN" \
            --otel-exporter community \
            --otel-backend collector \
            --otel-endpoint "${{ inputs.otlp_endpoint }}" \
            --otel-backend-endpoint "${{ inputs.collector_query_endpoint }}"

  s3_collector:
    name: Community layer + S3 collector
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      COLLECTOR_LAYER_NAME: durable-execution-conformance-python-s3-collector
      OTEL_LAMBDA_CHECKOUT: .build/opentelemetry-lambda
      TEST_STACK_NAME: conformance-tests-python-s3
      TEST_NAME: python-s3
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check out OpenTelemetry Lambda collector
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: open-telemetry/opentelemetry-lambda
          ref: layer-collector/0.22.0
          path: ${{ env.OTEL_LAMBDA_CHECKOUT }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ env.OTEL_LAMBDA_CHECKOUT }}/collector/go.mod
          cache-dependency-path: |
            ${{ env.OTEL_LAMBDA_CHECKOUT }}/collector/go.sum
            ${{ env.OTEL_LAMBDA_CHECKOUT }}/collector/lambdacomponents/go.sum

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
          role-session-name: durableExecutionConformancePythonS3
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS test account
        env:
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
        run: |
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL_ACCOUNT_ID" != "$TEST_ACCOUNT_ID" ]; then
            echo "Expected AWS account $TEST_ACCOUNT_ID but assumed into $ACTUAL_ACCOUNT_ID"
            exit 1
          fi
          echo "Using AWS test account $ACTUAL_ACCOUNT_ID"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3

      - name: Install Hatch
        run: python -m pip install hatch==1.16.5

      - name: Test Python and collector contracts
        run: |
          hatch run test:all \
            packages/aws-durable-execution-conformance-tests-otel/tests/test_collector.py \
            packages/aws-durable-execution-conformance-tests-otel/tests/test_python_examples.py

      - name: Build S3 collector Lambda layer
        run: |
          bash packages/aws-durable-execution-conformance-tests-otel/examples/collector/build-lambda-layer.sh \
            "$OTEL_LAMBDA_CHECKOUT" \
            "$RUNNER_TEMP/opentelemetry-s3-collector-layer.zip"

      - name: Publish S3 collector Lambda layer
        run: |
          COLLECTOR_LAYER_ARN=$(
            aws lambda publish-layer-version \
              --layer-name "$COLLECTOR_LAYER_NAME" \
              --description "OpenTelemetry S3 collector for conformance run $GITHUB_RUN_ID" \
              --zip-file "fileb://$RUNNER_TEMP/opentelemetry-s3-collector-layer.zip" \
              --compatible-runtimes python3.13 \
              --compatible-architectures x86_64 \
              --query LayerVersionArn \
              --output text
          )
          echo "COLLECTOR_LAYER_ARN=$COLLECTOR_LAYER_ARN" >> "$GITHUB_ENV"
          aws lambda get-layer-version-by-arn \
            --arn "$COLLECTOR_LAYER_ARN" \
            --query LayerVersionArn \
            --output text > /dev/null
          echo "Using S3 collector layer $COLLECTOR_LAYER_ARN"

      - name: Create run-scoped S3 telemetry bucket
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
          TEST_ROLE_ARN: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
        run: |
          OTEL_S3_BUCKET="dex-otel-python-${TEST_ACCOUNT_ID}-${AWS_REGION}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          OTEL_S3_PREFIX=traces
          {
            echo "OTEL_S3_BUCKET=$OTEL_S3_BUCKET"
            echo "OTEL_S3_PREFIX=$OTEL_S3_PREFIX"
            echo "OTEL_S3_URI=s3://$OTEL_S3_BUCKET/$OTEL_S3_PREFIX"
          } >> "$GITHUB_ENV"
          if [ "$AWS_REGION" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$OTEL_S3_BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$OTEL_S3_BUCKET" \
              --create-bucket-configuration "LocationConstraint=$AWS_REGION"
          fi
          aws s3api put-public-access-block \
            --bucket "$OTEL_S3_BUCKET" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          BUCKET_POLICY=$(
            jq -n \
              --arg bucket "$OTEL_S3_BUCKET" \
              --arg prefix "$OTEL_S3_PREFIX" \
              --arg reader "$TEST_ROLE_ARN" \
              --arg writer "$LAMBDA_EXECUTION_ROLE_ARN" \
              '{
                Version: "2012-10-17",
                Statement: [
                  {
                    Sid: "CollectorWrite",
                    Effect: "Allow",
                    Principal: {AWS: $writer},
                    Action: ["s3:PutObject", "s3:AbortMultipartUpload"],
                    Resource: ("arn:aws:s3:::" + $bucket + "/" + $prefix + "/*")
                  },
                  {
                    Sid: "RunnerList",
                    Effect: "Allow",
                    Principal: {AWS: $reader},
                    Action: "s3:ListBucket",
                    Resource: ("arn:aws:s3:::" + $bucket),
                    Condition: {StringLike: {"s3:prefix": [$prefix, ($prefix + "/*")]}}
                  },
                  {
                    Sid: "RunnerRead",
                    Effect: "Allow",
                    Principal: {AWS: $reader},
                    Action: ["s3:GetObject", "s3:DeleteObject"],
                    Resource: ("arn:aws:s3:::" + $bucket + "/" + $prefix + "/*")
                  }
                ]
              }'
          )
          aws s3api put-bucket-policy \
            --bucket "$OTEL_S3_BUCKET" \
            --policy "$BUCKET_POLICY"

      - name: Delete rolled-back test stack
        run: |
          stack_status=$(
            aws cloudformation describe-stacks \
              --stack-name "$TEST_STACK_NAME" \
              --query "Stacks[0].StackStatus" \
              --output text 2>/dev/null || true
          )
          if [ "$stack_status" = "ROLLBACK_COMPLETE" ]; then
            aws cloudformation delete-stack --stack-name "$TEST_STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$TEST_STACK_NAME"
          fi

      - name: Run S3 collector conformance tests
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          hatch run validate \
            --template "$PYTHON_TEST_TEMPLATE" \
            --language python \
            --region "$AWS_REGION" \
            --name "$TEST_NAME" \
            --no-cleanup \
            --suite otel \
            --history-dir "$RUNNER_TEMP/python-otel-history" \
            --report console json junit \
            --report-file "$RUNNER_TEMP/python-otel-s3-report" \
            --fail-on failed+uncovered \
            --parameter-overrides \
              "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN" \
              "OtelCollectorLayerArn=$COLLECTOR_LAYER_ARN" \
              "OtelCollectorBucket=$OTEL_S3_BUCKET" \
              "OtelCollectorPrefix=$OTEL_S3_PREFIX" \
            --otel-exporter community \
            --otel-endpoint http://localhost:4318 \
            --otel-service-name invocation \
            --otel-backend collector \
            --otel-backend-endpoint "$OTEL_S3_URI" \
            --otel-poll-timeout 90 \
            --otel-poll-attempts 45

      - name: Show CloudFormation diagnostics
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name "$TEST_STACK_NAME" \
            --query "StackEvents[?ResourceStatus == 'CREATE_FAILED'].[Timestamp,LogicalResourceId,ResourceType,ResourceStatusReason]" \
            --output table || true

      - name: Show Lambda logs
        if: failure()
        run: |
          for case_number in {1..19}; do
            log_group="/aws/lambda/conformance-tests-${TEST_NAME}-otel-${case_number}"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 30m --format short || true
            echo "::endgroup::"
          done
          for case_number in 11 18; do
            log_group="/aws/lambda/conformance-tests-${TEST_NAME}-otel-${case_number}-target"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 30m --format short || true
            echo "::endgroup::"
          done

      - name: Show execution history diagnostics
        if: failure()
        run: |
          shopt -s nullglob
          for artifact in "$RUNNER_TEMP"/python-otel-history/*.json; do
            if [[ "$artifact" == *-otel.json ]]; then
              continue
            fi
            echo "::group::$artifact"
            cat "$artifact"
            echo "::endgroup::"
          done

      - name: Show normalized S3 trace diagnostics
        if: failure()
        run: |
          shopt -s nullglob
          for artifact in "$RUNNER_TEMP"/python-otel-history/*-otel.json; do
            echo "::group::$artifact"
            cat "$artifact"
            echo "::endgroup::"
          done

      - name: Show S3 collector objects
        if: failure() && env.OTEL_S3_BUCKET != ''
        run: |
          aws s3api list-objects-v2 \
            --bucket "$OTEL_S3_BUCKET" \
            --prefix "$OTEL_S3_PREFIX/" \
            --query "Contents[].[LastModified,Size,Key]" \
            --output table || true

      - name: Upload reports and histories
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-otel-s3-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/python-otel-history/
            ${{ runner.temp }}/python-otel-s3-report.json
            ${{ runner.temp }}/python-otel-s3-report.xml
          if-no-files-found: ignore

      - name: Delete test resources
        if: always()
        run: |
          if aws cloudformation describe-stacks --stack-name "$TEST_STACK_NAME" > /dev/null 2>&1; then
            aws cloudformation delete-stack --stack-name "$TEST_STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$TEST_STACK_NAME" || true
          fi
          if [ -n "${OTEL_S3_BUCKET:-}" ]; then
            aws s3 rm "s3://$OTEL_S3_BUCKET/$OTEL_S3_PREFIX" --recursive || true
            aws s3api delete-bucket --bucket "$OTEL_S3_BUCKET" || true
          fi
          if [ -n "${COLLECTOR_LAYER_ARN:-}" ]; then
            aws lambda delete-layer-version \
              --layer-name "$COLLECTOR_LAYER_NAME" \
              --version-number "${COLLECTOR_LAYER_ARN##*:}" || true
          fi
