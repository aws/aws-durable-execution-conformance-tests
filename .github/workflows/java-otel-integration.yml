name: Java OpenTelemetry

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/java-otel-integration.yml
      - packages/aws-durable-execution-conformance-tests/src/**
      - packages/aws-durable-execution-conformance-tests-otel/src/**
      - packages/aws-durable-execution-conformance-tests-otel/test-requirements/otel/**
      - packages/aws-durable-execution-conformance-tests-otel/examples/java/**
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        default: us-west-2
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: java-otel-examples-${{ inputs.aws_region || 'us-west-2' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ inputs.aws_region || 'us-west-2' }}
  JAVA_TEST_TEMPLATE: packages/aws-durable-execution-conformance-tests-otel/examples/java/template.yaml
  TEST_NAME: java-xray

jobs:
  xray:
    name: ADOT + X-Ray
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: corretto
          java-version: "21"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
          role-session-name: durableExecutionConformanceJavaOtelXRay
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS test account
        env:
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
        run: |
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL_ACCOUNT_ID" != "$TEST_ACCOUNT_ID" ]; then
            echo "Expected AWS account $TEST_ACCOUNT_ID but assumed into $ACTUAL_ACCOUNT_ID"
            exit 1
          fi
          echo "Using AWS test account $ACTUAL_ACCOUNT_ID"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3

      - name: Install Hatch
        run: python -m pip install hatch==1.16.5

      - name: Verify legacy ADOT Java collector layer
        run: |
          # Keep the collector-only layer until https://github.com/aws/aws-durable-execution-sdk-java/pull/540 lands.
          ADOT_LAYER_ARN="arn:aws:lambda:${AWS_REGION}:901920570463:layer:aws-otel-java-agent-amd64-ver-1-32-0:6"
          aws lambda get-layer-version-by-arn \
            --arn "$ADOT_LAYER_ARN" \
            --region "$AWS_REGION" \
            --query LayerVersionArn \
            --output text > /dev/null
          echo "Using legacy ADOT Java layer $ADOT_LAYER_ARN"
          echo "ADOT_LAYER_ARN=$ADOT_LAYER_ARN" >> "$GITHUB_ENV"

      - name: Compile Java handlers
        run: |
          mvn -B -q -DskipTests package \
            --file packages/aws-durable-execution-conformance-tests-otel/examples/java/pom.xml

      - name: Run Java X-Ray conformance tests
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          hatch run validate \
            --template "$JAVA_TEST_TEMPLATE" \
            --language java \
            --region "$AWS_REGION" \
            --name "$TEST_NAME" \
            --no-cleanup \
            --suite otel \
            --history-dir "$RUNNER_TEMP/java-otel-history" \
            --report console json junit \
            --report-file "$RUNNER_TEMP/java-otel-xray-report" \
            --fail-on failed+uncovered \
            --parameter-overrides "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN" \
            --otel-exporter adot \
            --otel-layer-arn "$ADOT_LAYER_ARN" \
            --otel-service-name invocation \
            --otel-backend xray

      - name: Show Lambda logs
        if: failure()
        run: |
          for case_number in {1..19}; do
            log_group="/aws/lambda/durable-execution-conformance-tests-${TEST_NAME}-otel-${case_number}"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 20m --format short || true
            echo "::endgroup::"
          done
          for case_number in 11 18; do
            log_group="/aws/lambda/durable-execution-conformance-tests-${TEST_NAME}-otel-${case_number}-target"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 20m --format short || true
            echo "::endgroup::"
          done

      - name: Show saved diagnostics
        if: failure()
        run: |
          shopt -s nullglob
          for artifact in "$RUNNER_TEMP"/java-otel-history/*.json; do
            echo "::group::$artifact"
            cat "$artifact"
            echo "::endgroup::"
          done

      - name: Upload reports and histories
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: java-otel-xray-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/java-otel-history/
            ${{ runner.temp }}/java-otel-xray-report.json
            ${{ runner.temp }}/java-otel-xray-report.xml
          if-no-files-found: ignore
