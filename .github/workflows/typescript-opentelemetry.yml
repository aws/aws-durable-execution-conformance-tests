name: TypeScript OpenTelemetry

on:
  pull_request:
    paths:
      - .github/workflows/typescript-opentelemetry.yml
      - packages/aws-durable-execution-conformance-tests/src/**
      - packages/aws-durable-execution-conformance-tests-otel/src/**
      - packages/aws-durable-execution-conformance-tests-otel/test-requirements/otel/**
      - packages/aws-durable-execution-conformance-tests-otel/examples/typescript/**
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        default: us-west-2
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: typescript-otel-examples-${{ inputs.aws_region || 'us-west-2' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ inputs.aws_region || 'us-west-2' }}
  TEST_STACK_NAME: durable-execution-conformance-tests-typescript-xray
  TEST_NAME: typescript-xray
  TYPESCRIPT_EXAMPLES: packages/aws-durable-execution-conformance-tests-otel/examples/typescript
  TYPESCRIPT_TEST_TEMPLATE: packages/aws-durable-execution-conformance-tests-otel/examples/typescript/template.yaml

jobs:
  xray:
    name: ADOT + X-Ray
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.TYPESCRIPT_EXAMPLES }}/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PYTHON_TEST_ROLE_ARN }}
          role-session-name: durableExecutionConformanceTypeScriptOtelXRay
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS test account
        env:
          TEST_ACCOUNT_ID: ${{ secrets.PYTHON_TEST_ACCOUNT_ID }}
        run: |
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL_ACCOUNT_ID" != "$TEST_ACCOUNT_ID" ]; then
            echo "Expected AWS account $TEST_ACCOUNT_ID but assumed into $ACTUAL_ACCOUNT_ID"
            exit 1
          fi
          echo "Using AWS test account $ACTUAL_ACCOUNT_ID"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3

      - name: Install Hatch
        run: python -m pip install hatch==1.16.5

      - name: Resolve latest AWS Distro for OpenTelemetry JavaScript layer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ADOT_LAYER_ARN=$(
            gh api repos/aws-observability/aws-otel-js-instrumentation/releases/latest \
              --jq .body |
              awk -F '|' -v region="$AWS_REGION" '
                $2 ~ "^[[:space:]]*" region "[[:space:]]*$" {
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", $3)
                  print $3
                  exit
                }
              '
          )
          if [ -z "$ADOT_LAYER_ARN" ]; then
            echo "Could not resolve AWSOpenTelemetryDistroJs for $AWS_REGION"
            exit 1
          fi
          aws lambda get-layer-version-by-arn \
            --arn "$ADOT_LAYER_ARN" \
            --region "$AWS_REGION" \
            --query LayerVersionArn \
            --output text > /dev/null
          echo "Using AWSOpenTelemetryDistroJs layer $ADOT_LAYER_ARN"
          echo "ADOT_LAYER_ARN=$ADOT_LAYER_ARN" >> "$GITHUB_ENV"

      - name: Build TypeScript handlers with SDK main
        working-directory: ${{ env.TYPESCRIPT_EXAMPLES }}
        run: |
          npm ci
          npm run install-sdk-main
          npm run typecheck
          npm run build

      - name: Delete rolled-back test stack
        run: |
          stack_status=$(
            aws cloudformation describe-stacks \
              --stack-name "$TEST_STACK_NAME" \
              --query "Stacks[0].StackStatus" \
              --output text 2>/dev/null || true
          )
          if [ "$stack_status" = "ROLLBACK_COMPLETE" ]; then
            aws cloudformation delete-stack --stack-name "$TEST_STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$TEST_STACK_NAME"
          fi

      - name: Run X-Ray conformance tests
        env:
          LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.PYTHON_TEST_LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          hatch run validate \
            --template "$TYPESCRIPT_TEST_TEMPLATE" \
            --language javascript \
            --region "$AWS_REGION" \
            --name "$TEST_NAME" \
            --no-cleanup \
            --suite otel \
            --history-dir "$RUNNER_TEMP/typescript-otel-history" \
            --report console json junit \
            --report-file "$RUNNER_TEMP/typescript-otel-xray-report" \
            --fail-on failed+uncovered \
            --parameter-overrides "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN" \
            --otel-exporter adot \
            --otel-layer-arn "$ADOT_LAYER_ARN" \
            --otel-service-name invocation \
            --otel-backend xray

      - name: Show CloudFormation diagnostics
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name "$TEST_STACK_NAME" \
            --query "StackEvents[?ResourceStatus == 'CREATE_FAILED'].[Timestamp,LogicalResourceId,ResourceType,ResourceStatusReason]" \
            --output table || true

      - name: Show Lambda logs
        if: failure()
        run: |
          for case_number in {1..19}; do
            log_group="/aws/lambda/durable-execution-conformance-tests-${TEST_NAME}-otel-${case_number}"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 20m --format short || true
            echo "::endgroup::"
          done
          for case_number in 11 18; do
            log_group="/aws/lambda/durable-execution-conformance-tests-${TEST_NAME}-otel-${case_number}-target"
            echo "::group::$log_group"
            aws logs tail "$log_group" --since 20m --format short || true
            echo "::endgroup::"
          done

      - name: Show execution history diagnostics
        if: failure()
        run: |
          shopt -s nullglob
          for artifact in "$RUNNER_TEMP"/typescript-otel-history/*.json; do
            if [[ "$artifact" == *-otel.json ]]; then
              continue
            fi
            echo "::group::$artifact"
            cat "$artifact"
            echo "::endgroup::"
          done

      - name: Show normalized X-Ray trace diagnostics
        if: failure()
        run: |
          shopt -s nullglob
          for artifact in "$RUNNER_TEMP"/typescript-otel-history/*-otel.json; do
            echo "::group::$artifact"
            cat "$artifact"
            echo "::endgroup::"
          done

      - name: Upload reports and histories
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typescript-otel-xray-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/typescript-otel-history/
            ${{ runner.temp }}/typescript-otel-xray-report.json
            ${{ runner.temp }}/typescript-otel-xray-report.xml
          if-no-files-found: ignore
