# Publishes one independently versioned distribution from a GitHub Release.
name: Upload PyPI Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  e2e:
    name: Runner E2E gate
    uses: ./.github/workflows/e2e.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  release-build:
    name: Build selected distribution
    runs-on: ubuntu-latest
    outputs:
      project: ${{ steps.package.outputs.project }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Hatch
        run: python -m pip install hatch==1.16.5

      - name: Select package from release tag
        id: package
        shell: bash
        run: |
          case "${{ github.event.release.tag_name }}" in
            core-v*)
              echo "directory=packages/aws-durable-execution-conformance-tests" >> "$GITHUB_OUTPUT"
              echo "project=aws-durable-execution-conformance-tests" >> "$GITHUB_OUTPUT"
              echo "version=${{ github.event.release.tag_name }}" | sed 's/^version=core-v/version=/' >> "$GITHUB_OUTPUT"
              ;;
            otel-v*)
              echo "directory=packages/aws-durable-execution-conformance-tests-otel" >> "$GITHUB_OUTPUT"
              echo "project=aws-durable-execution-conformance-tests-otel" >> "$GITHUB_OUTPUT"
              echo "version=${{ github.event.release.tag_name }}" | sed 's/^version=otel-v/version=/' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Release tags must be core-vX.Y.Z or otel-vX.Y.Z."
              exit 1
              ;;
          esac

      - name: Verify release version
        working-directory: ${{ steps.package.outputs.directory }}
        run: |
          actual="$(hatch version)"
          test "$actual" = "${{ steps.package.outputs.version }}" || {
            echo "::error::Tag version ${{ steps.package.outputs.version }} does not match package version $actual."
            exit 1
          }

      - name: Build release distribution
        working-directory: ${{ steps.package.outputs.directory }}
        run: hatch build

      - name: Upload distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: ${{ steps.package.outputs.directory }}/dist/

  pypi-publish:
    name: Publish selected distribution
    runs-on: ubuntu-latest
    needs: [release-build, e2e]
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.release-build.outputs.project }}/
    steps:
      - name: Retrieve distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
