# Uploads the Python package to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) -- no API tokens are stored as secrets.
# https://docs.pypi.org/trusted-publishers/
#
# This workflow uses actions that are not certified by GitHub. They are
# provided by a third-party and are governed by separate terms of service,
# privacy policy, and support documentation.
name: Upload PyPI Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Hatch
        run: python -m pip install --upgrade hatch==1.16.5

      - name: Verify tag matches package version
        working-directory: packages/aws-durable-execution-conformance-tests
        run: |
          pkg_version="$(hatch version)"
          tag="${{ github.event.release.tag_name }}"
          case "$tag" in
            v*) ;;
            *)
              echo "::error::Release tag ('$tag') must start with 'v' (e.g. v$pkg_version)."
              exit 1
              ;;
          esac
          if [ "v$pkg_version" != "$tag" ]; then
            echo "::error::Release tag ('$tag') does not match package version ('v$pkg_version' from __about__.py). Bump __about__.py or fix the release tag before publishing."
            exit 1
          fi
          echo "Release tag '$tag' matches package version 'v$pkg_version'."

      - name: Build release distributions
        working-directory: packages/aws-durable-execution-conformance-tests
        run: hatch build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dists
          path: packages/aws-durable-execution-conformance-tests/dist/

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/aws-durable-execution-conformance-tests/${{ github.event.release.name }}
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
